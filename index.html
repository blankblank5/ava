<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elemental Arena - Owner Edition</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #87ceeb; font-family: sans-serif; }
    #start-screen { position: absolute; inset: 0; background: #111; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .el-btn { padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; transition: transform 0.1; }
    .el-btn:hover { transform: scale(1.05); }
    
    #admin-login { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.9); z-index:200; flex-direction:column; align-items:center; justify-content:center; color:white; }
    #admin-panel { display:none; position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.9); border:2px solid cyan; padding:15px; color:white; z-index:150; border-radius:8px; width:300px; max-height: 80vh; overflow-y: auto; }
    .admin-btn { width: 100%; margin-bottom: 5px; padding: 8px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; }
    
    .tab-container { display: flex; margin-bottom: 15px; border-bottom: 2px solid #444; }
    .tab-btn { flex: 1; padding: 8px; background: #222; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 12px; }
    .tab-btn.active { background: cyan; color: black; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    #death-screen { display: none; position: absolute; inset: 0; background: rgba(150, 0, 0, 0.9); z-index: 300; flex-direction: column; align-items: center; justify-content: center; color: white; pointer-events: all; }
    #game-ui { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 2px 2px 0 #000; pointer-events: none; display: none; }
    #moves-container { position: absolute; bottom: 20px; right: 20px; display: none; gap: 10px; }
    .move-slot { background: rgba(0,0,0,0.6); border: 2px solid #555; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    .cooldown-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(255,0,0,0.5); z-index: 1; height: 0%; }
    #chat-wrapper { position: absolute; top: 10px; left: 10px; width: 320px; height: 250px; background: rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 100; border: 1px solid #444; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 10px; color: white; font-size: 14px; }
  </style>
</head>
<body>

  <div id="death-screen">
      <h1 style="font-size: 80px; margin: 0;">YOU DIED</h1>
      <h2 style="font-size: 30px;">Respawning in <span id="respawn-timer" style="color: #ffcc00;">5</span>...</h2>
  </div>

  <div id="start-screen">
    <h1 style="font-size: 40px;">ELEMENTAL ARENA</h1>
    <input type="text" id="player-name-input" placeholder="Enter Name..." maxlength="15" style="padding: 10px; margin-bottom: 20px; text-align: center;">
    <div style="display: flex; gap: 10px;">
      <button class="el-btn" style="background:white;" onclick="initGame('AIR')">AIR</button>
      <button class="el-btn" style="background:#8b4513; color:white;" onclick="initGame('EARTH')">EARTH</button>
      <button class="el-btn" style="background:#ff4500; color:white;" onclick="initGame('FIRE')">FIRE</button>
      <button class="el-btn" style="background:#0088ff; color:white;" onclick="initGame('WATER')">WATER</button>
    </div>
  </div>

  <div id="admin-login">
    <h2>Access Restricted</h2>
    <input type="password" id="admin-pass" placeholder="Password..." style="padding:10px;">
    <button onclick="checkAdminLogin()" style="margin-top:10px; padding:10px;">Login</button>
  </div>
  
  <div id="admin-panel">
    <h3 id="panel-title" style="color:cyan; text-align:center;">Panel</h3>
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('self')">Self</button>
        <button class="tab-btn" onclick="switchTab('give')">Give</button>
        <button class="tab-btn" onclick="switchTab('server')">Server</button>
    </div>

    <div id="tab-self" class="tab-content active">
        <button class="admin-btn" onclick="sendAdminAction('godmode', window.myId)" style="background:#8a0;">Godmode</button>
        <button class="admin-btn" onclick="sendAdminAction('nocooldown', window.myId)" style="background:#b80;">No CD</button>
    </div>

    <div id="tab-give" class="tab-content">
        <select id="give-player-list" style="width:100%; margin-bottom:10px;"></select>
        <button class="admin-btn" onclick="sendAdminAction('heal', document.getElementById('give-player-list').value)">Heal</button>
        <select id="power-list" style="width:100%; margin-top:10px;">
            <option value="AIR">Air</option><option value="EARTH">Earth</option>
            <option value="FIRE">Fire</option><option value="WATER">Water</option>
            <option value="LIGHTNING">Lightning</option>
        </select>
        <button class="admin-btn" onclick="socket.emit('adminCommand', {action:'givePower', targetId:document.getElementById('give-player-list').value, value:document.getElementById('power-list').value})">Give Power</button>
    </div>

    <div id="tab-server" class="tab-content">
        <select id="server-player-list" style="width:100%; margin-bottom:10px;"></select>
        <button class="admin-btn" onclick="sendAdminAction('jail', document.getElementById('server-player-list').value)">Jail</button>
        <button class="admin-btn" onclick="sendAdminAction('mute', document.getElementById('server-player-list').value)">Mute</button>
        <button class="admin-btn" onclick="sendAdminAction('kick', document.getElementById('server-player-list').value)" style="background:darkred;">Kick</button>
        
        <div id="owner-only-tools" style="display:none; border-top: 2px solid red; margin-top: 15px; padding-top: 10px;">
            <h4 style="color:red; margin:0;">Owner Tools</h4>
            <button class="admin-btn" onclick="sendAdminAction('ban', document.getElementById('server-player-list').value)" style="background:black; color:red; border:1px solid red;">BAN BROWSER</button>
            <hr>
            <h4 style="color:red; margin:5px 0;">Safe Box (Bans)</h4>
            <select id="banned-list" style="width:100%; margin-bottom:5px;"></select>
            <button class="admin-btn" onclick="unbanPlayer()" style="background:green;">Unban Selected</button>
            <button class="admin-btn" onclick="sendAdminAction('nuke', null)" style="background:darkred; margin-top:10px;">NUKE SERVER</button>
        </div>
    </div>
  </div>

  <div id="game-ui">
    <h2 id="display-name">Player</h2>
    <div style="width: 200px; height: 10px; background: #400; border: 1px solid #000;">
        <div id="hp-bar" style="width: 100%; height: 100%; background: #f22;"></div>
    </div>
    <h3 id="el-name">AIR</h3>
  </div>

  <div id="moves-container">
    <div class="move-slot"><div id="move0-name">M1</div><div class="cooldown-overlay" id="cd0"></div></div>
    <div class="move-slot"><div id="move1-name">Q</div><div class="cooldown-overlay" id="cd1"></div></div>
    <div class="move-slot"><div id="move2-name">E</div><div class="cooldown-overlay" id="cd2"></div></div>
    <div class="move-slot"><div id="move3-name">R</div><div class="cooldown-overlay" id="cd3"></div></div>
  </div>

  <div id="chat-wrapper">
    <div id="chat-messages"></div>
    <input type="text" id="chat-input" placeholder="Press Enter to Chat...">
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    const socket = io('https://your-render-url.onrender.com'); // REPLACE WITH YOUR URL

    // --- DEVICE ID & BAN CHECK ---
    let myDeviceId = localStorage.getItem('arena_device_id');
    if (!myDeviceId) {
        myDeviceId = 'dev_' + Math.floor(Math.random() * 1000000000);
        localStorage.setItem('arena_device_id', myDeviceId);
    }

    let isGameStarted = false;
    window.myId = null;
    window.sessionRole = "player";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x33aa33 }));
    floor.rotation.x = -Math.PI / 2; scene.add(floor);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    window.initGame = (el) => {
        const name = document.getElementById('player-name-input').value || "Player";
        socket.emit('joinGame', { name, element: el, deviceId: myDeviceId });
    };

    socket.on('joinSuccess', (data) => {
        window.myId = data.id;
        isGameStarted = true;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('moves-container').style.display = 'flex';
        document.getElementById('chat-wrapper').style.display = 'flex';
        document.body.requestPointerLock();
    });

    socket.on('death', () => {
        const screen = document.getElementById('death-screen');
        const timer = document.getElementById('respawn-timer');
        document.exitPointerLock();
        screen.style.display = 'flex';
        let left = 5;
        timer.innerText = left;
        const count = setInterval(() => {
            left--; timer.innerText = left;
            if(left <= 0) { clearInterval(count); screen.style.display = 'none'; document.body.requestPointerLock(); }
        }, 1000);
    });

    socket.on('serverNuked', () => {
        document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%;'>DISCONNECTED: SERVER CLOSED OR BANNED</h1>";
    });

    // ADMIN LOGIC
    window.checkAdminLogin = () => {
        const pass = document.getElementById('admin-pass').value;
        if(pass === '1FOREST1' || pass === 'Caleb1') {
            window.sessionRole = pass === 'Caleb1' ? 'owner' : 'admin';
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('panel-title').innerText = window.sessionRole.toUpperCase() + " PANEL";
            if(window.sessionRole === 'owner') document.getElementById('owner-only-tools').style.display = 'block';
            socket.emit('setRole', window.sessionRole);
        } else { alert("Wrong Password!"); }
    };

    window.sendAdminAction = (action, targetId) => {
        let val = null;
        if(action === 'ban') {
            val = prompt("Who is this? (Real Name for Safe Box):");
            if(!val) return;
        }
        socket.emit('adminCommand', { action, targetId, value: val });
    };

    window.unbanPlayer = () => {
        const devId = document.getElementById('banned-list').value;
        if(devId) socket.emit('adminCommand', { action: 'unban', deviceId: devId });
    };

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
    };

    // INPUTS & RENDERING (Kept exactly as before)
    const inputs = { forward: false, backward: false, left: false, right: false, yaw: 0, pitch: 0 };
    document.addEventListener('mousemove', (e) => {
        if(document.pointerLockElement === document.body) {
            inputs.yaw -= e.movementX * 0.002; inputs.pitch -= e.movementY * 0.002;
        }
    });

    socket.on('gameState', (state) => {
        if(!isGameStarted) return;
        const p = state.players[window.myId];
        if(p) {
            camera.position.set(p.x, p.y + 1.6, p.z);
            camera.rotation.set(p.pitch, p.yaw, 0, 'YXZ');
            document.getElementById('hp-bar').style.width = (p.hp / p.maxHp * 100) + "%";
            document.getElementById('el-name').innerText = p.element;
        }
        
        // Populate Admin Lists
        if(document.getElementById('admin-panel').style.display === 'block') {
            const list1 = document.getElementById('give-player-list');
            const list2 = document.getElementById('server-player-list');
            const banList = document.getElementById('banned-list');
            
            const prev1 = list1.value; const prev2 = list2.value;
            list1.innerHTML = ""; list2.innerHTML = "";
            for(let id in state.players) {
                const opt = `<option value="${id}">${state.players[id].name}</option>`;
                list1.innerHTML += opt; list2.innerHTML += opt;
            }
            list1.value = prev1; list2.value = prev2;

            if(window.sessionRole === 'owner' && state.bannedPlayers) {
                banList.innerHTML = "";
                for(let devId in state.bannedPlayers) {
                    const b = state.bannedPlayers[devId];
                    banList.innerHTML += `<option value="${devId}">${b.realName} (was ${b.lastNick})</option>`;
                }
            }
        }
    });

    setInterval(() => { if(isGameStarted) socket.emit('input', inputs); }, 1000/30);
    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); } animate();
  </script>
</body>
</html>
