<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elemental Arena</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', sans-serif; }
    #start-screen { position:absolute;inset:0;background:#0a0a0f;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white; }
    .el-btn { padding:14px 28px;font-size:17px;font-weight:bold;cursor:pointer;border:2px solid transparent;border-radius:8px;transition:transform 0.12s,box-shadow 0.12s;letter-spacing:1px; }
    .el-btn:hover { transform:scale(1.07);box-shadow:0 0 18px rgba(255,255,255,0.25); }
    #admin-login { display:none;position:absolute;inset:0;background:rgba(0,0,0,0.92);z-index:200;flex-direction:column;align-items:center;justify-content:center;color:white; }
    #admin-panel { display:none;position:absolute;top:20px;right:20px;background:rgba(8,8,16,0.96);border:2px solid cyan;padding:15px;color:white;z-index:150;border-radius:10px;width:300px;max-height:80vh;overflow-y:auto;box-shadow:0 0 24px rgba(0,200,255,0.2); }
    .admin-btn { width:100%;margin-bottom:5px;padding:8px;cursor:pointer;font-weight:bold;border:none;border-radius:5px;transition:opacity 0.15s; }
    .admin-btn:hover { opacity:0.82; }
    .tab-container { display:flex;margin-bottom:15px;border-bottom:2px solid #333; }
    .tab-btn { flex:1;padding:8px;background:#1a1a2e;color:#aaa;border:none;cursor:pointer;font-weight:bold;font-size:12px; }
    .tab-btn.active { background:cyan;color:black; }
    .tab-content { display:none; } .tab-content.active { display:block; }
    #moves-container { position:absolute;bottom:18px;right:18px;display:none;flex-direction:row;gap:6px;z-index:20;filter:drop-shadow(0 3px 10px rgba(0,0,0,0.9)); }
    .move-slot { background:rgba(12,12,20,0.88);border:2px solid #555;border-radius:6px;width:76px;height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;position:relative;overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s; }
    .move-slot.upgraded { border-color:#ffd700 !important;box-shadow:0 0 10px rgba(255,215,0,0.7) !important; }
    .move-slot.boss-reward { border-color:#ff6600 !important;box-shadow:0 0 10px rgba(255,100,0,0.7) !important; }
    .move-key { position:absolute;top:4px;left:5px;font-size:10px;font-weight:bold;color:#999; }
    .move-name { font-size:10px;text-align:center;z-index:2;padding:0 3px;font-weight:bold;line-height:1.25;margin-top:10px; }
    .charge-count { position:absolute;top:4px;right:5px;font-size:12px;font-weight:bold;color:#fff;z-index:3;text-shadow:1px 1px 0 #000; }
    .cooldown-overlay { position:absolute;bottom:0;left:0;width:100%;height:0%;background:rgba(200,30,30,0.5);z-index:1; }
    #boss-hud { position:absolute;top:16px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:3px;z-index:25;pointer-events:none; }
    #boss-name-label { color:#ff5500;font-weight:bold;font-size:14px;letter-spacing:3px;text-shadow:0 0 12px rgba(255,80,0,0.9),0 1px 3px #000; }
    #boss-hp-track { width:360px;height:20px;background:rgba(0,0,0,0.75);border:2px solid #882200;border-radius:5px;overflow:hidden;box-shadow:0 0 8px rgba(200,30,0,0.5); }
    #boss-hp-fill { height:100%;width:100%;background:linear-gradient(90deg,#6a0000,#ff3300,#ff6600);transition:width 0.12s; }
    #boss-hp-text { color:#ffccaa;font-size:12px;font-weight:bold;text-shadow:1px 1px 0 #000; }
    #boss-phase-label { font-size:11px;font-weight:bold;letter-spacing:2px;color:#ff8800;text-shadow:0 0 6px rgba(255,140,0,0.8); }
    #dir-indicator { position:absolute;top:60px;left:50%;transform:translateX(-50%);width:440px;height:32px;display:none;pointer-events:none;z-index:19; }
    .dir-pip { position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);gap:1px; }
    .dir-pip-dot { width:10px;height:10px;border-radius:50%; }
    .dir-pip-name { font-size:10px;font-weight:bold;color:#fff;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap; }
    #flash-overlay { position:absolute;inset:0;background:rgba(0,50,255,0.25);pointer-events:none;opacity:0;transition:opacity 0.4s;z-index:50; }
    #nametags-container { position:absolute;inset:0;pointer-events:none;z-index:5; }
    .nametag { position:absolute;transform:translate(-50%,-100%);display:none;flex-direction:column;align-items:center;gap:2px;padding-bottom:4px; }
    .nametag-name { color:white;font-weight:bold;font-size:13px;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap; }
    .nametag-element { font-size:11px;font-weight:bold;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap; }
    .nametag-hp-text { color:#fff;font-size:11px;font-weight:bold;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000; }
    .nametag-hp-track { width:80px;height:6px;background:rgba(0,0,0,0.6);border:1px solid #333;border-radius:3px;overflow:hidden; }
    .nametag-hp-fill { height:100%;background:#ff2222;transition:width 0.2s,background 0.3s; }
    #chat-wrapper { position:absolute;top:10px;left:10px;width:320px;height:250px;background:rgba(0,0,0,0.55);display:none;flex-direction:column;z-index:100;border-radius:8px;border:1px solid #333; }
    #chat-messages { flex:1;overflow-y:auto;padding:10px;color:white;font-size:13px;text-shadow:1px 1px 0 #000;display:flex;flex-direction:column;gap:3px;pointer-events:auto; }
    #chat-input-container { display:flex;border-top:1px solid #333; }
    #chat-input { flex:1;background:rgba(0,0,0,0.7);color:white;border:none;padding:9px 10px;outline:none;font-family:inherit;font-size:13px;border-radius:0 0 0 8px; }
    #chat-send-btn { background:#1a1a2e;color:cyan;border:none;cursor:pointer;padding:0 14px;font-size:15px;border-radius:0 0 8px 0;transition:background 0.15s; }
    #chat-send-btn:hover { background:#333; }
    #chat-toggle-btn { position:absolute;top:10px;right:10px;z-index:90;padding:7px 12px;background:rgba(0,0,0,0.55);color:white;border:1px solid #444;cursor:pointer;border-radius:6px;display:none;font-weight:bold;font-size:12px; }
    #crosshair { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;width:0;height:0; }
    #crosshair::before,#crosshair::after { content:'';position:absolute;background:rgba(255,255,255,0.88);border-radius:1px; }
    #crosshair::before { width:14px;height:2px;top:-1px;left:-7px; }
    #crosshair::after  { width:2px;height:14px;top:-7px;left:-1px; }
    #game-ui { position:absolute;bottom:20px;left:20px;color:white;text-shadow:1px 1px 3px #000;pointer-events:none;user-select:none;display:none; }
    #reward-popup { position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.92);border-radius:14px;text-align:center;display:none;z-index:200;pointer-events:none;padding:22px 36px;animation:popIn 0.4s ease; }
    #boss-reward-popup { position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);background:rgba(10,0,0,0.95);border:3px solid #ff4400;border-radius:14px;text-align:center;display:none;z-index:201;pointer-events:none;padding:26px 40px;animation:popIn 0.5s ease; }
    @keyframes popIn { from{transform:translate(-50%,-50%) scale(0.7);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }
  </style>
</head>
<body>
<div id="flash-overlay"></div>
<div id="nametags-container"></div>
<div id="dir-indicator"></div>
<div id="crosshair"></div>
<div id="reward-popup"></div>
<div id="boss-reward-popup"></div>

<div id="boss-hud">
  <div id="boss-name-label">⚔ THE STONE TITAN</div>
  <div id="boss-hp-track"><div id="boss-hp-fill"></div></div>
  <div id="boss-hp-text">3000 / 3000</div>
  <div id="boss-phase-label"></div>
</div>

<button id="chat-toggle-btn" onclick="toggleChat()">Chat [ON]</button>
<div id="chat-wrapper">
  <div id="chat-messages"></div>
  <div id="chat-input-container">
    <input type="text" id="chat-input" placeholder="Press Enter or / to chat..." maxlength="100">
    <button id="chat-send-btn">➤</button>
  </div>
</div>

<!-- START SCREEN -->
<div id="start-screen">
  <h1 style="font-size:52px;margin-bottom:4px;letter-spacing:3px;text-shadow:0 0 30px rgba(255,255,255,0.3);">ELEMENTAL ARENA</h1>
  <p style="color:#555;margin-bottom:24px;font-size:13px;letter-spacing:2px;">MULTIPLAYER COMBAT</p>
  <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="15"
    style="padding:13px 18px;font-size:19px;margin-bottom:20px;text-align:center;border-radius:8px;border:2px solid #333;background:#111;color:white;width:300px;outline:none;">
  <p style="color:#666;font-size:12px;letter-spacing:2px;margin-bottom:12px;">SELECT ELEMENT</p>
  <div style="display:flex;gap:12px;">
    <button class="el-btn" id="btn-air"   style="background:#e0e0e0;color:#222;border-color:#bbb;">💨 AIR</button>
    <button class="el-btn" id="btn-earth" style="background:#6b3410;color:white;border-color:#8b4513;">🪨 EARTH</button>
    <button class="el-btn" id="btn-fire"  style="background:#cc3500;color:white;border-color:#ff4500;">🔥 FIRE</button>
    <button class="el-btn" id="btn-water" style="background:#0066cc;color:white;border-color:#0088ff;">💧 WATER</button>
  </div>
  <div id="conn-status" style="margin-top:20px;font-size:13px;color:#888;">Connecting to server...</div>
</div>

<!-- ADMIN LOGIN -->
<div id="admin-login">
  <h2>Admin / Owner Login</h2>
  <input type="password" id="admin-pass" placeholder="Password..." style="padding:10px;font-size:17px;border-radius:6px;border:1px solid #444;background:#111;color:white;outline:none;">
  <button onclick="checkAdminLogin()" style="margin-top:10px;padding:10px 22px;font-size:17px;border-radius:6px;cursor:pointer;">Login</button>
  <button onclick="closeAdminLogin()" style="margin-top:8px;padding:6px 14px;background:#880000;color:white;border:none;border-radius:6px;cursor:pointer;">Cancel</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <h3 id="panel-title" style="margin-top:0;color:cyan;text-align:center;letter-spacing:1px;">Admin Panel</h3>
  <div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('self')" id="btn-tab-self">Self</button>
    <button class="tab-btn" onclick="switchTab('give')" id="btn-tab-give">Give</button>
    <button class="tab-btn" onclick="switchTab('server')" id="btn-tab-server">Server</button>
  </div>
  <div id="tab-self" class="tab-content active">
    <button class="admin-btn" onclick="sendAdminAction('godmode',window.myId)" style="background:#88aa00;">Toggle Godmode</button>
    <button class="admin-btn" onclick="sendAdminAction('nocooldown',window.myId)" style="background:#bb8800;">Toggle No Cooldowns</button>
    <button class="admin-btn" onclick="sendAdminAction('equipLightning',window.myId)" style="background:#0055ff;color:white;">Equip Lightning</button>
  </div>
  <div id="tab-give" class="tab-content">
    <select id="give-player-list" style="width:100%;padding:7px;margin-bottom:8px;font-weight:bold;border-radius:4px;"></select>
    <button class="admin-btn" onclick="sendAdminAction('heal',document.getElementById('give-player-list').value)" style="background:#00aa00;color:white;">Heal Player</button>
    <button class="admin-btn" onclick="sendAdminAction('godmode',document.getElementById('give-player-list').value)" style="background:#88aa00;">Toggle God Mode</button>
    <button class="admin-btn" onclick="sendAdminAction('nocooldown',document.getElementById('give-player-list').value)" style="background:#bb8800;">Toggle No Cooldowns</button>
    <hr style="border-color:#333;margin:8px 0;">
    <select id="power-list" style="width:100%;padding:5px;margin-bottom:5px;border-radius:4px;">
      <option value="AIR">Air</option><option value="EARTH">Earth</option>
      <option value="FIRE">Fire</option><option value="WATER">Water</option>
    </select>
    <button class="admin-btn" onclick="givePower()" style="background:#444;color:white;">Give Standard Element</button>
    <button class="admin-btn" onclick="sendAdminAction('giveAll',document.getElementById('give-player-list').value)" style="background:#2288cc;color:white;">Give ALL Elements</button>
    <div id="owner-give-section" style="display:none;margin-top:8px;">
      <h4 style="margin:4px 0;color:#ff4444;">Owner Actions</h4>
      <button class="admin-btn" onclick="sendAdminAction('removeAllPowers',document.getElementById('give-player-list').value)" style="background:#ff3333;color:white;">Remove All Powers</button>
    </div>
  </div>
  <div id="tab-server" class="tab-content">
    <select id="server-player-list" style="width:100%;padding:7px;margin-bottom:8px;font-weight:bold;border-radius:4px;"></select>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;">
      <button class="admin-btn" onclick="sendAdminAction('jail',document.getElementById('server-player-list').value)" style="flex:1;">Jail</button>
      <button class="admin-btn" onclick="sendAdminAction('freeze',document.getElementById('server-player-list').value)" style="flex:1;">Freeze</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;">
      <button class="admin-btn" onclick="sendAdminAction('mute',document.getElementById('server-player-list').value)" style="flex:1;background:#cc7700;color:white;">Mute</button>
      <button class="admin-btn" onclick="sendAdminAction('kick',document.getElementById('server-player-list').value)" style="flex:1;background:#aa0000;color:white;">Kick</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;">
      <button class="admin-btn" onclick="sendAdminAction('tp',document.getElementById('server-player-list').value)" style="flex:1;">TP To</button>
      <button class="admin-btn" onclick="sendAdminAction('bring',document.getElementById('server-player-list').value)" style="flex:1;">Bring</button>
    </div>
    <div id="owner-server-section" style="display:none;">
      <hr style="border-color:#333;margin:8px 0;">
      <h4 style="margin:4px 0;color:#ff4444;">Owner Actions</h4>
      <button class="admin-btn" onclick="sendAdminAction('giveAdmin',document.getElementById('server-player-list').value)" style="background:#aa22aa;color:white;">Give Admin Role</button>
      <button class="admin-btn" onclick="sendAdminAction('stripAdmin',document.getElementById('server-player-list').value)" style="background:#ff3333;color:white;">Strip Admin &amp; Powers</button>
      <hr style="border-color:#333;margin:8px 0;">
      <button class="admin-btn" onclick="sendAdminAction('nuke',null)" style="background:darkred;color:white;font-size:15px;padding:14px;">NUKE SERVER</button>
    </div>
  </div>
</div>

<!-- SELF UI -->
<div id="game-ui">
  <div style="margin-bottom:7px;">
    <div id="display-name" style="font-size:17px;font-weight:bold;color:#ddd;margin-bottom:4px;">Player</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:190px;height:13px;background:#3a0000;border:2px solid #1a0000;border-radius:4px;overflow:hidden;">
        <div id="hp-bar" style="width:100%;height:100%;background:linear-gradient(90deg,#cc0000,#ff4444);transition:width 0.18s;"></div>
      </div>
      <span id="hp-numeric" style="font-size:12px;font-weight:bold;color:#fff;min-width:58px;">100/100</span>
    </div>
  </div>
  <div id="el-name" style="font-size:26px;font-weight:bold;letter-spacing:1px;">AIR</div>
</div>

<!-- HOTBAR -->
<div id="moves-container">
  <div class="move-slot" id="slot0"><div class="move-key">LMB</div><div class="charge-count" id="ch0"></div><div class="move-name" id="move0-name">Basic</div><div class="cooldown-overlay" id="cd0"></div></div>
  <div class="move-slot" id="slot1"><div class="move-key">Q</div><div class="charge-count" id="ch1"></div><div class="move-name" id="move1-name">Heavy</div><div class="cooldown-overlay" id="cd1"></div></div>
  <div class="move-slot" id="slot2"><div class="move-key">E</div><div class="charge-count" id="ch2"></div><div class="move-name" id="move2-name">Utility</div><div class="cooldown-overlay" id="cd2"></div></div>
  <div class="move-slot" id="slot3"><div class="move-key">R</div><div class="charge-count" id="ch3"></div><div class="move-name" id="move3-name">Ultimate</div><div class="cooldown-overlay" id="cd3"></div></div>
</div>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

const SERVER_URL = 'https://ava-pwjs.onrender.com';
const PLAYER_HEIGHT = 1.85, EYE_HEIGHT = 1.62;
const WALL_HALF_W = 3.0, WALL_HALF_H = 2.0, WALL_HALF_D = 0.5;

const ELEMENTS_UI = {
    AIR:       { color:0xffffff, hexStr:'#ffffff', moves:[{name:'Air Blast'},{name:'Wind Blade'},{name:'Air Dash',maxCharges:3,cd:2500},{name:'Hurricane',cd:7000}]},
    EARTH:     { color:0x8b4513, hexStr:'#a0522d', moves:[{name:'Rock Throw'},{name:'Ground Spikes',cd:4500},{name:'Earth Wall',cd:5000},{name:'Meteor',cd:11000}]},
    FIRE:      { color:0xff4500, hexStr:'#ff4500', moves:[{name:'Fireball'},{name:'Fire Blast',cd:4000},{name:'Flamethrower',cd:4500},{name:'Flaming Meteor',cd:14000}]},
    WATER:     { color:0x0088ff, hexStr:'#0088ff', moves:[{name:'Water Bullet'},{name:'Tsunami',cd:4000},{name:'Water Whip',cd:3000},{name:'Whirlpool',cd:8000}]},
    LIGHTNING: { color:0x00ffff, hexStr:'#00ffff', moves:[{name:'Lightning Strike'},{name:'Flash'},{name:'Spark Dash',maxCharges:2,cd:1000},{name:'Thunderstorm'}]}
};
function elColor(el){return(ELEMENTS_UI[el]&&ELEMENTS_UI[el].hexStr)||'#ffffff';}

let isGameStarted=false, myElement='';
window.myId=null; window.sessionRole='player';
const inputs={forward:false,backward:false,left:false,right:false,jump:false,sprint:false,yaw:0,pitch:0};
function resetInputs(){inputs.forward=inputs.backward=inputs.left=inputs.right=inputs.jump=inputs.sprint=false;inputs.yaw=inputs.pitch=0;}

// ── SOCKET — connect early and show status on start screen ───────────────────
const socket = io(SERVER_URL, { autoConnect: true });
const connStatus = document.getElementById('conn-status');
socket.on('connect', () => { connStatus.style.color='#44ff88'; connStatus.innerText='✓ Connected — choose your element!'; });
socket.on('connect_error', () => { connStatus.style.color='#ff4444'; connStatus.innerText='✗ Cannot reach server — check Render is awake.'; });
socket.on('disconnect', () => { connStatus.style.color='#ffaa00'; connStatus.innerText='Disconnected. Refresh to reconnect.'; });

// ── SCENE ─────────────────────────────────────────────────────────────────────
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);
scene.fog=new THREE.FogExp2(0x87ceeb,0.006);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,3000);
camera.rotation.order='YXZ';
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

const sun=new THREE.DirectionalLight(0xfff8e8,1.3);sun.position.set(80,160,60);
sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-200;sun.shadow.camera.right=200;sun.shadow.camera.top=200;sun.shadow.camera.bottom=-200;sun.shadow.camera.far=600;
scene.add(sun);scene.add(new THREE.AmbientLight(0x6688cc,1.0));
const fill=new THREE.DirectionalLight(0xaaccff,0.3);fill.position.set(-40,20,-40);scene.add(fill);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(3000,3000),new THREE.MeshStandardMaterial({color:0x2d8a2d,roughness:0.92}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
const grid=new THREE.GridHelper(3000,600,0x000000,0x1c6e1c);
grid.position.y=0.02;grid.material.opacity=0.3;grid.material.transparent=true;scene.add(grid);

// Jail
const jailGroup=new THREE.Group();jailGroup.position.set(20,0.02,20);
const plateMat=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.8});
jailGroup.add(new THREE.Mesh(new THREE.BoxGeometry(12,0.5,12),plateMat));
const roofM=new THREE.Mesh(new THREE.BoxGeometry(12,0.5,12),plateMat);roofM.position.y=10;jailGroup.add(roofM);
const barMat=new THREE.MeshStandardMaterial({color:0x888888,metalness:0.75,roughness:0.25});
const barGeo=new THREE.CylinderGeometry(0.12,0.12,10,8);
for(let x=-5.5;x<=5.5;x+=1.5){const b1=new THREE.Mesh(barGeo,barMat);b1.position.set(x,5,-5.5);jailGroup.add(b1);const b2=new THREE.Mesh(barGeo,barMat);b2.position.set(x,5,5.5);jailGroup.add(b2);}
for(let z=-4;z<=4;z+=1.5){jailGroup.add(Object.assign(new THREE.Mesh(barGeo,barMat),{position:new THREE.Vector3(-5.5,5,z)}));jailGroup.add(Object.assign(new THREE.Mesh(barGeo,barMat),{position:new THREE.Vector3(5.5,5,z)}));}
scene.add(jailGroup);

// Boss Arena
(function buildArena(){
    const CX=120,CZ=0;
    const stone=new THREE.MeshStandardMaterial({color:0x7a6e5a,roughness:0.95});
    const dark=new THREE.MeshStandardMaterial({color:0x3a3028,roughness:1.0});
    const moss=new THREE.MeshStandardMaterial({color:0x3a5030,roughness:1.0});
    const sand=new THREE.MeshStandardMaterial({color:0xc8b060,roughness:0.9});
    const blood=new THREE.MeshStandardMaterial({color:0x5a1a0a,roughness:1.0});

function getOrCreateWallPoints(id){if(wallPoints[id])return wallPoints[id];const dg=new THREE.MeshBasicMaterial({color:0xff0000}),dc=new THREE.MeshBasicMaterial({color:0x00ff00});const geo=new THREE.SphereGeometry(0.12,6,6);const pL=new THREE.Mesh(geo,dg),pC=new THREE.Mesh(geo,dc),pR=new THREE.Mesh(geo,dg);pL.position.set(-WALL_HALF_W,0,0);pC.position.set(0,0,0);pR.position.set(WALL_HALF_W,0,0);const pivot=new THREE.Group();pivot.add(pL,pC,pR);scene.add(pivot);wallPoints[id]={pivot};return wallPoints[id];}
function cleanupWallPoints(id){if(!wallPoints[id])return;scene.remove(wallPoints[id].pivot);delete wallPoints[id];}

function createProjectileMesh(data){
    const s=data.size;
    const mat=new THREE.MeshStandardMaterial({color:data.color,emissive:data.color,emissiveIntensity:0.65,roughness:0.3,metalness:0.1});
    if(data.shape==='lightning'){const g=new THREE.Group();const sg=new THREE.CylinderGeometry(0.07,0.07,2,6);const p1=new THREE.Mesh(sg,mat);p1.rotation.x=Math.PI/2;const p2=new THREE.Mesh(sg,mat);p2.rotation.x=Math.PI/2;p2.position.set(0.25,0.1,1.4);p2.rotation.y=0.3;g.add(p1,p2);scene.add(g);return g;}
    let geo;
    if(data.shape==='whirlpool')geo=new THREE.TorusGeometry(s*4,s*0.5,8,24);
    else if(data.shape==='icosahedron')geo=new THREE.IcosahedronGeometry(s*1.5,0);
    else if(data.shape==='octahedron')geo=new THREE.OctahedronGeometry(s*2,0);
    else if(data.shape==='tetrahedron')geo=new THREE.TetrahedronGeometry(s*1.5,0);
    else if(data.shape==='torusknot')geo=new THREE.TorusKnotGeometry(s*1.5,s*0.4,64,8);
    else if(data.shape==='rock')geo=new THREE.DodecahedronGeometry(s*2,0);
    else if(data.shape==='spike')geo=new THREE.ConeGeometry(s*0.5,s*5,5);
    else if(data.shape==='flat')geo=new THREE.BoxGeometry(s*5,s/2,s*2);
    else if(data.shape==='cylinder'){geo=new THREE.CylinderGeometry(s*0.8,s*0.8,s*4,8);geo.rotateX(Math.PI/2);}
    else if(data.shape==='wall'){geo=new THREE.BoxGeometry(6,4,1);mat.transparent=true;mat.opacity=0.88;}
    else if(data.shape==='cone'){geo=new THREE.ConeGeometry(s*3.5,s*10,8);geo.rotateX(Math.PI);}
    else geo=new THREE.SphereGeometry(s,10,10);
    const mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;scene.add(mesh);return mesh;
}

socket.on('serverNuked',()=>{if(window.sessionRole==='owner')return;document.exitPointerLock();document.body.innerHTML='<div style="background:black;color:red;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;"><h1 style="font-size:76px;margin:0;text-shadow:0 0 20px red;">SERVER NUKED</h1><p style="font-size:22px;color:white;margin-top:20px;">Refresh to reconnect.</p></div>';});
socket.on('chatMessage',(data)=>{const box=document.getElementById('chat-messages');const d=document.createElement('div');d.innerHTML=data.name==='SYSTEM'?`<span style="font-weight:bold;color:#ff4444;">[SYSTEM]:</span> <span style="color:#ffaaaa;">${data.text}</span>`:`<span style="font-weight:bold;color:#ffcc00;">[${data.name}]:</span> ${data.text}`;box.appendChild(d);box.scrollTop=box.scrollHeight;});
socket.on('shrineCollected',(data)=>{document.getElementById('slot0').classList.add('upgraded');document.getElementById('move0-name').innerText=data.moveName;const n=document.getElementById('reward-popup');const elColors={AIR:'#aaaaff',EARTH:'#a0522d',FIRE:'#ff4500',WATER:'#0088ff'};n.style.border=`2px solid ${elColors[data.element]||'gold'}`;n.innerHTML=`<div style="font-size:22px;font-weight:bold;color:${elColors[data.element]||'gold'}">✨ ${data.element} SKY SHRINE</div><div style="font-size:15px;color:#fff;margin-top:8px;">Basic attack upgraded to:</div><div style="font-size:20px;font-weight:bold;color:${elColors[data.element]||'gold'};margin-top:4px;">${data.moveName}</div>`;n.style.display='block';setTimeout(()=>n.style.display='none',5000);});
socket.on('bossReward',(data)=>{document.getElementById('slot3').classList.add('boss-reward');document.getElementById('move3-name').innerText=data.moveName;const n=document.getElementById('boss-reward-popup');n.innerHTML=`<div style="font-size:26px;font-weight:bold;color:#ff6600">🏆 TITAN DEFEATED!</div><div style="font-size:15px;color:#ffccaa;margin-top:8px;">Your Ultimate upgraded to:</div><div style="font-size:22px;font-weight:bold;color:#ff6600;margin-top:5px;">${data.moveName}</div>`;n.style.display='block';setTimeout(()=>n.style.display='none',7000);});
socket.on('bossDefeated',()=>{bossMeshGroup.visible=false;bossRubble.visible=true;document.getElementById('boss-hud').style.display='none';});

socket.on('gameState',(state)=>{
    if(!isGameStarted)return;
    const now=Date.now();t+=0.018;
    document.getElementById('flash-overlay').style.opacity=(state.slowMo&&state.slowMo.active)?'1':'0';
    if(document.getElementById('admin-panel').style.display==='block'){const gs=document.getElementById('give-player-list'),ss=document.getElementById('server-player-list');const cg=gs.value,cs=ss.value;gs.innerHTML=ss.innerHTML='';for(const id in state.players){const lb=state.players[id].name+(id===window.myId?' (You)':'');gs.appendChild(Object.assign(document.createElement('option'),{value:id,innerText:lb}));ss.appendChild(Object.assign(document.createElement('option'),{value:id,innerText:lb}));}if(state.players[cg])gs.value=cg;if(state.players[cs])ss.value=cs;}
    if(state.boss){const bHUD=document.getElementById('boss-hud');if(state.boss.alive){bHUD.style.display='flex';bossMeshGroup.visible=true;bossRubble.visible=false;const pct=Math.max(0,state.boss.hp)/state.boss.maxHp*100;document.getElementById('boss-hp-fill').style.width=pct+'%';document.getElementById('boss-hp-text').innerText=`${Math.max(0,Math.ceil(state.boss.hp))} / ${state.boss.maxHp}`;document.getElementById('boss-phase-label').innerText=state.boss.phase===2?'⚠ ENRAGED — PHASE 2':'';if(state.boss.phase===2)document.getElementById('boss-hp-fill').style.background='linear-gradient(90deg,#550000,#ff0000,#ff4400)';bossMeshGroup.position.set(state.boss.x,state.boss.y,state.boss.z);bossMeshGroup.rotation.y=state.boss.yaw;const sw=Math.sin(t*7)*0.3;if(bossMeshGroup.children[1])bossMeshGroup.children[1].rotation.x=sw;if(bossMeshGroup.children[2])bossMeshGroup.children[2].rotation.x=-sw;if(bossMeshGroup.children[5])bossMeshGroup.children[5].rotation.x=-sw;if(bossMeshGroup.children[6])bossMeshGroup.children[6].rotation.x=sw;}else{bHUD.style.display='none';bossMeshGroup.visible=false;bossRubble.visible=true;bossRubble.position.set(state.boss.x||120,0,state.boss.z||0);}}
    for(const el in shrineOrbs){const orb=shrineOrbs[el];orb.position.y=3.7+Math.sin(t*2.2+el.charCodeAt(0)*0.5)*0.4;orb.rotation.y+=0.025;if(shrineRings[el]){shrineRings[el].rotation.z+=0.02;shrineRings[el].position.y=orb.position.y;}}
    for(const el in shrineGroups){const g=shrineGroups[el];if(g.userData.orbitRocks){g.userData.orbitRocks.forEach(rk=>{rk.userData.angle+=rk.userData.speed;rk.position.x=Math.cos(rk.userData.angle)*rk.userData.radius;rk.position.z=Math.sin(rk.userData.angle)*rk.userData.radius;rk.position.y=rk.userData.yOff+Math.sin(rk.userData.angle*3)*1.2;rk.rotation.y+=0.01;});}}
    updateDirIndicator(state);
    for(const id in state.players){const p=state.players[id];if(id===window.myId){camera.position.set(p.x,p.y+EYE_HEIGHT,p.z);camera.rotation.set(p.pitch,p.yaw,0);document.getElementById('hp-bar').style.width=Math.max(0,p.hp)+'%';document.getElementById('hp-numeric').innerText=p.godMode?'∞/∞':`${Math.max(0,Math.ceil(p.hp))}/100`;if(myElement!==p.element){myElement=p.element;const el=ELEMENTS_UI[p.element]||ELEMENTS_UI['AIR'];document.getElementById('el-name').innerText=p.element;document.getElementById('el-name').style.color='#'+el.color.toString(16).padStart(6,'0');for(let i=0;i<4;i++)document.getElementById(`move${i}-name`).innerText=el.moves[i].name;}for(let i=0;i<4;i++){const el=ELEMENTS_UI[p.element]||ELEMENTS_UI['AIR'];const max=el.moves[i].maxCharges||1;document.getElementById(`ch${i}`).innerText=max>1?`[${p.charges[i]}]`:'';if(p.charges[i]<max){const rem=Math.max(0,p.rechargeTimers[i]-now);document.getElementById(`cd${i}`).style.height=(rem/(el.moves[i].cd||1000))*100+'%';}else document.getElementById(`cd${i}`).style.height='0%';}}else{if(!playerMeshes[id]){playerMeshes[id]=makePlayerMesh();scene.add(playerMeshes[id]);ensureNametag(id,p.name);}playerMeshes[id].position.set(p.x,p.y,p.z);playerMeshes[id].rotation.y=p.yaw+Math.PI;const el=ELEMENTS_UI[p.element]||ELEMENTS_UI['AIR'];const ntEl=document.getElementById(`nt-el-${id}`),ntTxt=document.getElementById(`nt-hp-txt-${id}`),ntFil=document.getElementById(`nt-hp-${id}`);if(ntEl){ntEl.innerText=p.element;ntEl.style.color=el.hexStr;}if(ntTxt)ntTxt.innerText=p.godMode?'∞/100':`${Math.max(0,Math.ceil(p.hp))}/100`;if(ntFil){ntFil.style.width=Math.max(0,p.hp)+'%';ntFil.style.background=p.godMode?'#ffd700':'#ff2222';}tempV.set(p.x,p.y+PLAYER_HEIGHT+0.35,p.z);tempV.project(camera);if(tempV.z<1){nametagElements[id].style.display='flex';nametagElements[id].style.left=`${(tempV.x*0.5+0.5)*window.innerWidth}px`;nametagElements[id].style.top=`${(-(tempV.y*0.5)+0.5)*window.innerHeight}px`;}else nametagElements[id].style.display='none';}}
    for(const id in playerMeshes){if(!state.players[id]){scene.remove(playerMeshes[id]);delete playerMeshes[id];if(nametagElements[id]){nametagElements[id].remove();delete nametagElements[id];}}}
    const activeProjIds=new Set(state.projectiles.map(pr=>pr.id));const activeWallIds=new Set();
    for(const pr of state.projectiles){if(!projectileMeshes[pr.id])projectileMeshes[pr.id]=createProjectileMesh(pr);const mesh=projectileMeshes[pr.id];mesh.position.set(pr.x,pr.y,pr.z);if(pr.shape==='wall'){mesh.rotation.y=pr.yaw;activeWallIds.add(pr.id);const wp=getOrCreateWallPoints(pr.id);wp.pivot.position.set(pr.x,pr.y,pr.z);wp.pivot.rotation.y=pr.yaw;}else if(pr.shape==='spike'){mesh.rotation.set(0,0,0);}else if(pr.shape==='whirlpool'){if(!whirlpoolAngles[pr.id])whirlpoolAngles[pr.id]=0;whirlpoolAngles[pr.id]+=0.18;mesh.rotation.x=Math.PI/2;mesh.rotation.z=whirlpoolAngles[pr.id];}else if(pr.shape==='icosahedron'||pr.shape==='octahedron'||pr.shape==='tetrahedron'||pr.shape==='torusknot'){mesh.rotation.x+=0.11;mesh.rotation.y+=0.09;}else if(pr.vx!==0||pr.vy!==0||pr.vz!==0)mesh.lookAt(pr.x+pr.vx,pr.y+pr.vy,pr.z+pr.vz);}
    for(const id in wallPoints)if(!activeWallIds.has(id))cleanupWallPoints(id);
    for(const id in whirlpoolAngles)if(!activeProjIds.has(id))delete whirlpoolAngles[id];
    for(const id in projectileMeshes)if(!activeProjIds.has(id)){scene.remove(projectileMeshes[id]);delete projectileMeshes[id];}
});

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('mousemove',(e)=>{if(document.pointerLockElement===document.body){inputs.yaw-=e.movementX*0.002;inputs.pitch-=e.movementY*0.002;inputs.pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,inputs.pitch));}});
document.addEventListener('click',(e)=>{if(!isGameStarted)return;if(e.target.id==='chat-toggle-btn'||e.target.id==='chat-input'||e.target.id==='chat-send-btn'||e.target.closest('#chat-wrapper')||e.target.classList.contains('admin-btn'))return;if(document.pointerLockElement!==document.body&&document.getElementById('admin-panel').style.display!=='block'&&document.getElementById('admin-login').style.display!=='flex')document.body.requestPointerLock();});
document.addEventListener('mousedown',(e)=>{if(document.pointerLockElement===document.body&&e.button===0)socket.emit('useMove',0);});
const chatInput=document.getElementById('chat-input');
document.addEventListener('keydown',(e)=>{if(!isGameStarted)return;if(document.activeElement===chatInput)return;if(e.key==='Enter'||e.key==='/'){e.preventDefault();document.exitPointerLock();document.getElementById('chat-wrapper').style.display='flex';document.getElementById('chat-toggle-btn').innerText='Chat [ON]';chatInput.focus();return;}if(e.code==='KeyM'){const ln=document.getElementById('admin-login'),pn=document.getElementById('admin-panel');if(window.sessionRole==='admin'||window.sessionRole==='owner'){if(pn.style.display!=='block'){document.exitPointerLock();pn.style.display='block';}else{pn.style.display='none';document.body.requestPointerLock();}}else{if(ln.style.display!=='flex'){document.exitPointerLock();ln.style.display='flex';}else{ln.style.display='none';document.body.requestPointerLock();}}return;}if(document.pointerLockElement===document.body){if(e.code==='Digit1')socket.emit('switchElement','AIR');if(e.code==='Digit2')socket.emit('switchElement','EARTH');if(e.code==='Digit3')socket.emit('switchElement','FIRE');if(e.code==='Digit4')socket.emit('switchElement','WATER');if(e.code==='KeyQ')socket.emit('useMove',1);if(e.code==='KeyE')socket.emit('useMove',2);if(e.code==='KeyR')socket.emit('useMove',3);if(e.code==='KeyW'||e.code==='ArrowUp')inputs.forward=true;if(e.code==='KeyS'||e.code==='ArrowDown')inputs.backward=true;if(e.code==='KeyA'||e.code==='ArrowLeft')inputs.left=true;if(e.code==='KeyD'||e.code==='ArrowRight')inputs.right=true;if(e.code==='ShiftLeft')inputs.sprint=true;if(e.code==='Space')inputs.jump=true;}});
document.addEventListener('keyup',(e)=>{if(document.activeElement===chatInput)return;if(e.code==='KeyW'||e.code==='ArrowUp')inputs.forward=false;if(e.code==='KeyS'||e.code==='ArrowDown')inputs.backward=false;if(e.code==='KeyA'||e.code==='ArrowLeft')inputs.left=false;if(e.code==='KeyD'||e.code==='ArrowRight')inputs.right=false;if(e.code==='ShiftLeft')inputs.sprint=false;if(e.code==='Space')inputs.jump=false;});
document.addEventListener('pointerlockchange',()=>{if(document.pointerLockElement!==document.body)inputs.forward=inputs.backward=inputs.left=inputs.right=inputs.sprint=inputs.jump=false;});
document.getElementById('chat-send-btn').addEventListener('click',()=>{if(chatInput.value.trim()){socket.emit('chatMessage',chatInput.value);chatInput.value='';}});
chatInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();if(chatInput.value.trim()){socket.emit('chatMessage',chatInput.value);chatInput.value='';}chatInput.blur();}});

document.getElementById('btn-air').addEventListener('click',   ()=>socket.emit('joinGame',{name:document.getElementById('player-name-input').value.trim()||'Player',element:'AIR'}));
document.getElementById('btn-earth').addEventListener('click', ()=>socket.emit('joinGame',{name:document.getElementById('player-name-input').value.trim()||'Player',element:'EARTH'}));
document.getElementById('btn-fire').addEventListener('click',  ()=>socket.emit('joinGame',{name:document.getElementById('player-name-input').value.trim()||'Player',element:'FIRE'}));
document.getElementById('btn-water').addEventListener('click', ()=>socket.emit('joinGame',{name:document.getElementById('player-name-input').value.trim()||'Player',element:'WATER'}));

window.checkAdminLogin=()=>{const pass=document.getElementById('admin-pass').value;if(pass==='1FOREST1'||pass==='Caleb1'){document.getElementById('admin-login').style.display='none';document.getElementById('admin-panel').style.display='block';window.sessionRole=pass==='Caleb1'?'owner':'admin';document.getElementById('panel-title').innerText=window.sessionRole==='owner'?'Owner Panel':'Admin Panel';if(window.sessionRole==='owner'){document.getElementById('owner-give-section').style.display='block';document.getElementById('owner-server-section').style.display='block';}socket.emit('setRole',window.sessionRole);document.getElementById('admin-pass').value='';}else alert('Incorrect Password!');};
window.closeAdminLogin=()=>{document.getElementById('admin-login').style.display='none';document.body.requestPointerLock();};
window.switchTab=(id)=>{document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');document.getElementById('btn-tab-'+id).classList.add('active');};
window.sendAdminAction=(a,t)=>socket.emit('adminCommand',{action:a,targetId:t});
window.givePower=()=>socket.emit('adminCommand',{action:'givePower',targetId:document.getElementById('give-player-list').value,value:document.getElementById('power-list').value});
window.toggleChat=()=>{const c=document.getElementById('chat-wrapper'),b=document.getElementById('chat-toggle-btn');if(c.style.display==='none'){c.style.display='flex';b.innerText='Chat [ON]';}else{c.style.display='none';b.innerText='Chat [OFF]';}};

setInterval(()=>{if(isGameStarted&&document.pointerLockElement===document.body)socket.emit('input',inputs);},1000/30);
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
