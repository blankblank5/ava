<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elemental Arena</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; }

#start {
  position:absolute; inset:0; z-index:100;
  background:#0a0a0f; color:white;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
#start h1 { font-size:50px; letter-spacing:4px; text-shadow:0 0 30px rgba(255,255,255,0.2); }
#start p  { color:#555; font-size:12px; letter-spacing:3px; }
#name-input {
  padding:12px 18px; font-size:18px; text-align:center;
  background:#111; color:white; border:2px solid #333; border-radius:8px; outline:none; width:280px;
}
.el-row { display:flex; gap:12px; }
.el-btn {
  padding:13px 26px; font-size:16px; font-weight:bold; border:2px solid transparent;
  border-radius:8px; cursor:pointer; letter-spacing:1px; transition:transform 0.1s, box-shadow 0.1s;
}
.el-btn:hover { transform:scale(1.08); box-shadow:0 0 16px rgba(255,255,255,0.2); }
#conn { font-size:13px; color:#666; }

/* Flash overlay */
#flash { position:absolute; inset:0; pointer-events:none; z-index:30; background:rgba(0,100,255,0.22); opacity:0; transition:opacity 0.3s; }

/* Crosshair */
#xhair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:20; }
#xhair::before, #xhair::after { content:''; position:absolute; background:rgba(255,255,255,0.85); border-radius:1px; }
#xhair::before { width:14px; height:2px; top:-1px; left:-7px; }
#xhair::after  { width:2px; height:14px; top:-7px; left:-1px; }

/* Self HUD */
#hud {
  position:absolute; bottom:18px; left:18px; color:white;
  text-shadow:1px 1px 3px #000; pointer-events:none; z-index:20; display:none;
}
#hud-name  { font-size:16px; font-weight:bold; margin-bottom:5px; }
#hud-hprow { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
#hp-track  { width:190px; height:12px; background:#3a0000; border:2px solid #1a0000; border-radius:4px; overflow:hidden; }
#hp-fill   { height:100%; background:linear-gradient(90deg,#cc0000,#ff4444); transition:width 0.15s; }
#hp-num    { font-size:12px; font-weight:bold; min-width:60px; }
#el-label  { font-size:24px; font-weight:bold; letter-spacing:1px; }

/* Hotbar */
#hotbar {
  position:absolute; bottom:16px; right:16px;
  display:none; flex-direction:row; gap:7px; z-index:20;
}
.slot {
  width:76px; height:76px; background:rgba(10,10,18,0.88);
  border:2px solid #555; border-radius:7px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:white; position:relative; overflow:hidden;
}
.slot-key  { position:absolute; top:4px; left:5px; font-size:10px; font-weight:bold; color:#999; }
.slot-ch   { position:absolute; top:4px; right:5px; font-size:12px; font-weight:bold; z-index:3; }
.slot-name { font-size:10px; font-weight:bold; text-align:center; z-index:2; padding:0 3px; line-height:1.3; margin-top:12px; }
.slot-cd   { position:absolute; bottom:0; left:0; width:100%; height:0; background:rgba(200,30,30,0.5); z-index:1; }

/* Direction indicator */
#dirindicator {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  width:440px; height:32px; pointer-events:none; z-index:20; display:none;
}
.pip { position:absolute; top:0; display:flex; flex-direction:column; align-items:center; transform:translateX(-50%); gap:2px; }
.pip-dot  { width:10px; height:10px; border-radius:50%; }
.pip-name { font-size:10px; font-weight:bold; color:white; white-space:nowrap;
  text-shadow:-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }

/* Nametags */
#tags { position:absolute; inset:0; pointer-events:none; z-index:10; }
.tag { position:absolute; transform:translate(-50%,-100%); display:none; flex-direction:column; align-items:center; gap:2px; }
.tag-name { color:white; font-weight:bold; font-size:13px;
  text-shadow:-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; white-space:nowrap; }
.tag-el   { font-size:11px; font-weight:bold;
  text-shadow:-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; white-space:nowrap; }
.tag-hp   { color:white; font-size:11px; font-weight:bold;
  text-shadow:-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
.tag-bar  { width:80px; height:6px; background:rgba(0,0,0,0.6); border:1px solid #333; border-radius:3px; overflow:hidden; }
.tag-fill { height:100%; background:#ff2222; transition:width 0.2s; }

/* Chat */
#chat {
  position:absolute; top:10px; left:10px; width:310px; height:240px;
  background:rgba(0,0,0,0.55); display:none; flex-direction:column;
  z-index:90; border-radius:8px; border:1px solid #333;
}
#chat-msgs { flex:1; overflow-y:auto; padding:10px; color:white; font-size:13px;
  display:flex; flex-direction:column; gap:3px; }
#chat-row  { display:flex; border-top:1px solid #333; }
#chat-in   { flex:1; background:rgba(0,0,0,0.7); color:white; border:none; padding:8px 10px; outline:none; font-size:13px; border-radius:0 0 0 8px; }
#chat-send { background:#1a1a2e; color:cyan; border:none; cursor:pointer; padding:0 14px; border-radius:0 0 8px 0; font-size:15px; }
#chat-toggle { position:absolute; top:10px; right:10px; z-index:91; padding:7px 12px;
  background:rgba(0,0,0,0.55); color:white; border:1px solid #444; cursor:pointer;
  border-radius:6px; display:none; font-size:12px; font-weight:bold; }

/* Admin login / panel */
#admin-login {
  display:none; position:absolute; inset:0; background:rgba(0,0,0,0.92);
  z-index:200; flex-direction:column; align-items:center; justify-content:center; color:white; gap:10px;
}
#admin-login input { padding:10px; font-size:17px; border-radius:6px; border:1px solid #444; background:#111; color:white; outline:none; }
#admin-panel {
  display:none; position:absolute; top:20px; right:20px;
  background:rgba(8,8,16,0.96); border:2px solid cyan; padding:15px; color:white;
  z-index:150; border-radius:10px; width:290px; max-height:80vh; overflow-y:auto;
}
.abtn { width:100%; margin-bottom:5px; padding:8px; cursor:pointer; font-weight:bold; border:none; border-radius:5px; }
.tabs { display:flex; margin-bottom:14px; border-bottom:2px solid #333; }
.tbtn { flex:1; padding:8px; background:#1a1a2e; color:#aaa; border:none; cursor:pointer; font-weight:bold; font-size:12px; }
.tbtn.on { background:cyan; color:black; }
.tpanel { display:none; }
.tpanel.on { display:block; }
</style>
</head>
<body>

<div id="flash"></div>
<div id="xhair"></div>
<div id="tags"></div>
<div id="dirindicator"></div>

<!-- START SCREEN -->
<div id="start">
  <h1>ELEMENTAL ARENA</h1>
  <p>MULTIPLAYER COMBAT</p>
  <input id="name-input" type="text" placeholder="Enter your name..." maxlength="15">
  <p style="color:#555;font-size:11px;letter-spacing:2px;">SELECT YOUR ELEMENT</p>
  <div class="el-row">
    <button class="el-btn" id="btn-air"   style="background:#ddd;color:#111;border-color:#aaa;">💨 AIR</button>
    <button class="el-btn" id="btn-earth" style="background:#6b3410;color:#fff;border-color:#8b4513;">🪨 EARTH</button>
    <button class="el-btn" id="btn-fire"  style="background:#cc3500;color:#fff;border-color:#ff4500;">🔥 FIRE</button>
    <button class="el-btn" id="btn-water" style="background:#0055bb;color:#fff;border-color:#0088ff;">💧 WATER</button>
  </div>
  <div id="conn">Connecting to server...</div>
</div>

<!-- SELF HUD -->
<div id="hud">
  <div id="hud-name">Player</div>
  <div id="hud-hprow">
    <div id="hp-track"><div id="hp-fill"></div></div>
    <span id="hp-num">100/100</span>
  </div>
  <div id="el-label">AIR</div>
</div>

<!-- HOTBAR -->
<div id="hotbar">
  <div class="slot" id="s0"><div class="slot-key">LMB</div><div class="slot-ch" id="c0"></div><div class="slot-name" id="n0">Basic</div><div class="slot-cd" id="cd0"></div></div>
  <div class="slot" id="s1"><div class="slot-key">Q</div><div class="slot-ch" id="c1"></div><div class="slot-name" id="n1">Heavy</div><div class="slot-cd" id="cd1"></div></div>
  <div class="slot" id="s2"><div class="slot-key">E</div><div class="slot-ch" id="c2"></div><div class="slot-name" id="n2">Utility</div><div class="slot-cd" id="cd2"></div></div>
  <div class="slot" id="s3"><div class="slot-key">R</div><div class="slot-ch" id="c3"></div><div class="slot-name" id="n3">Ultimate</div><div class="slot-cd" id="cd3"></div></div>
</div>

<!-- CHAT -->
<button id="chat-toggle" onclick="toggleChat()">Chat [ON]</button>
<div id="chat">
  <div id="chat-msgs"></div>
  <div id="chat-row">
    <input id="chat-in" type="text" placeholder="Press Enter or / to chat..." maxlength="100">
    <button id="chat-send">➤</button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="admin-login">
  <h2>Admin / Owner Login</h2>
  <input type="password" id="admin-pass" placeholder="Password...">
  <button onclick="checkAdmin()" style="padding:10px 22px;font-size:16px;border-radius:6px;cursor:pointer;">Login</button>
  <button onclick="closeAdmin()" style="padding:8px 14px;background:#880000;color:white;border:none;border-radius:6px;cursor:pointer;">Cancel</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <h3 id="panel-title" style="margin:0 0 10px;color:cyan;text-align:center;letter-spacing:1px;">Admin Panel</h3>
  <div class="tabs">
    <button class="tbtn on"  onclick="swTab('self')"   id="tbtn-self">Self</button>
    <button class="tbtn"     onclick="swTab('give')"   id="tbtn-give">Give</button>
    <button class="tbtn"     onclick="swTab('server')" id="tbtn-server">Server</button>
  </div>
  <!-- Self -->
  <div class="tpanel on" id="tp-self">
    <button class="abtn" onclick="adm('godmode',myId)" style="background:#88aa00;">Toggle Godmode</button>
    <button class="abtn" onclick="adm('nocooldown',myId)" style="background:#bb8800;">Toggle No Cooldowns</button>
    <button class="abtn" onclick="adm('equipLightning',myId)" style="background:#0055ff;color:white;">Equip Lightning</button>
  </div>
  <!-- Give -->
  <div class="tpanel" id="tp-give">
    <select id="give-list" style="width:100%;padding:7px;margin-bottom:7px;border-radius:4px;font-weight:bold;"></select>
    <button class="abtn" onclick="adm('heal',gl())" style="background:#00aa00;color:white;">Heal Player</button>
    <button class="abtn" onclick="adm('godmode',gl())" style="background:#88aa00;">Toggle God Mode</button>
    <button class="abtn" onclick="adm('nocooldown',gl())" style="background:#bb8800;">Toggle No Cooldowns</button>
    <hr style="border-color:#333;margin:8px 0;">
    <select id="pow-list" style="width:100%;padding:5px;margin-bottom:6px;border-radius:4px;">
      <option value="AIR">Air</option><option value="EARTH">Earth</option>
      <option value="FIRE">Fire</option><option value="WATER">Water</option>
    </select>
    <button class="abtn" onclick="givePow()" style="background:#444;">Give Standard Element</button>
    <button class="abtn" onclick="adm('giveAll',gl())" style="background:#2288cc;color:white;">Give ALL Elements</button>
    <div id="owner-give" style="display:none;margin-top:8px;">
      <h4 style="color:#ff4444;margin-bottom:5px;">Owner</h4>
      <button class="abtn" onclick="adm('removeAllPowers',gl())" style="background:#ff3333;color:white;">Remove All Powers</button>
    </div>
  </div>
  <!-- Server -->
  <div class="tpanel" id="tp-server">
    <select id="srv-list" style="width:100%;padding:7px;margin-bottom:7px;border-radius:4px;font-weight:bold;"></select>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;">
      <button class="abtn" onclick="adm('jail',sl())" style="flex:1;">Jail</button>
      <button class="abtn" onclick="adm('freeze',sl())" style="flex:1;">Freeze</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;">
      <button class="abtn" onclick="adm('mute',sl())" style="flex:1;background:#cc7700;color:white;">Mute</button>
      <button class="abtn" onclick="adm('kick',sl())" style="flex:1;background:#aa0000;color:white;">Kick</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;">
      <button class="abtn" onclick="adm('tp',sl())" style="flex:1;">TP To</button>
      <button class="abtn" onclick="adm('bring',sl())" style="flex:1;">Bring</button>
    </div>
    <div id="owner-server" style="display:none;margin-top:10px;">
      <h4 style="color:#ff4444;margin-bottom:5px;">Owner</h4>
      <button class="abtn" onclick="adm('giveAdmin',sl())" style="background:#aa22aa;color:white;">Give Admin Role</button>
      <button class="abtn" onclick="adm('stripAdmin',sl())" style="background:#ff3333;color:white;">Strip Admin &amp; Powers</button>
      <hr style="border-color:#333;margin:8px 0;">
      <button class="abtn" onclick="adm('nuke',null)" style="background:darkred;color:white;font-size:15px;padding:14px;">NUKE SERVER</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var SERVER = 'https://ava-pwjs.onrender.com';
var EYE_H  = 1.62;

var EL = {
  AIR:      { hex:'#ccccff', col:0xaaaaff, moves:[{name:'Air Blast'},{name:'Wind Blade'},{name:'Air Dash',mc:3,cd:2500},{name:'Hurricane',cd:7000}] },
  EARTH:    { hex:'#a0522d', col:0x8b4513, moves:[{name:'Rock Throw'},{name:'Ground Spikes',cd:4500},{name:'Earth Wall',cd:5000},{name:'Meteor',cd:11000}] },
  FIRE:     { hex:'#ff4500', col:0xff4500, moves:[{name:'Fireball'},{name:'Fire Blast',cd:4000},{name:'Flamethrower',cd:4500},{name:'Flaming Meteor',cd:14000}] },
  WATER:    { hex:'#0088ff', col:0x0088ff, moves:[{name:'Water Bullet'},{name:'Tsunami',cd:4000},{name:'Water Whip',cd:3000},{name:'Whirlpool',cd:8000}] },
  LIGHTNING:{ hex:'#00ffff', col:0x00ffff, moves:[{name:'Lightning Strike'},{name:'Flash'},{name:'Spark Dash',mc:2,cd:1000},{name:'Thunderstorm'}] }
};
function ec(el){ return (EL[el]&&EL[el].hex)||'#fff'; }

// ── STATE ─────────────────────────────────────────────────────────────────────
var started=false, myId=null, myEl='', role='player';
var inp={forward:false,backward:false,left:false,right:false,jump:false,sprint:false,yaw:0,pitch:0};

// ── SOCKET ────────────────────────────────────────────────────────────────────
var socket = io(SERVER);
socket.on('connect',       function(){ setConn('✓ Connected — choose your element!','#44ff88'); });
socket.on('connect_error', function(){ setConn('✗ Cannot reach server','#ff4444'); });
socket.on('disconnect',    function(){ setConn('Disconnected. Refresh to reconnect.','#ffaa00'); });
function setConn(t,c){ var d=document.getElementById('conn'); d.innerText=t; d.style.color=c; }

// ── THREE ─────────────────────────────────────────────────────────────────────
var scene    = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog    = new THREE.FogExp2(0x87ceeb, 0.007);
var camera   = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.rotation.order = 'YXZ';
var renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
// Canvas MUST be behind all HTML UI
renderer.domElement.style.cssText = 'position:absolute;top:0;left:0;z-index:0;';
document.body.appendChild(renderer.domElement);

// Lights
var sun = new THREE.DirectionalLight(0xfff8e8, 1.3);
sun.position.set(80,160,60); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-200; sun.shadow.camera.right=200;
sun.shadow.camera.top=200; sun.shadow.camera.bottom=-200; sun.shadow.camera.far=600;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6688cc, 1.0));
var fill = new THREE.DirectionalLight(0xaaccff, 0.3);
fill.position.set(-40,20,-40); scene.add(fill);

// Floor
var floor = new THREE.Mesh(
  new THREE.PlaneGeometry(3000,3000),
  new THREE.MeshStandardMaterial({color:0x2d8a2d,roughness:0.92})
);
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
var grid = new THREE.GridHelper(3000,600,0x000000,0x1c6e1c);
grid.position.y=0.02; grid.material.opacity=0.3; grid.material.transparent=true; scene.add(grid);

// Jail
(function(){
  var g=new THREE.Group(); g.position.set(20,0,20);
  var pm=new THREE.MeshStandardMaterial({color:0x1a1a1a});
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(12,0.4,12),pm),{position:new THREE.Vector3(0,0.2,0)}));
  var roof=new THREE.Mesh(new THREE.BoxGeometry(12,0.4,12),pm); roof.position.y=10; g.add(roof);
  var bm=new THREE.MeshStandardMaterial({color:0x888888,metalness:0.8,roughness:0.2});
  var bg=new THREE.CylinderGeometry(0.12,0.12,10,8);
  for(var x=-5.5;x<=5.5;x+=1.5){
    var b=new THREE.Mesh(bg,bm); b.position.set(x,5,-5.5); g.add(b);
    var b2=new THREE.Mesh(bg,bm); b2.position.set(x,5,5.5); g.add(b2);
  }
  for(var z=-4;z<=4;z+=1.5){
    var b3=new THREE.Mesh(bg,bm); b3.position.set(-5.5,5,z); g.add(b3);
    var b4=new THREE.Mesh(bg,bm); b4.position.set(5.5,5,z); g.add(b4);
  }
  scene.add(g);
})();

// ── PLAYER FACTORY ────────────────────────────────────────────────────────────
function makePlayer(){
  var g=new THREE.Group();
  var sk=new THREE.MeshStandardMaterial({color:0xf5cba7,roughness:0.75});
  var bd=new THREE.MeshStandardMaterial({color:0x3a3a5c,roughness:0.8});
  var pn=new THREE.MeshStandardMaterial({color:0x2a2a3a,roughness:0.85});
  var sh=new THREE.MeshStandardMaterial({color:0x1a1008,roughness:0.9});
  var hr=new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:1.0});
  var ey=new THREE.MeshStandardMaterial({color:0x1a1a3a});
  function add(geo,mat,x,y,z){var m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);m.castShadow=true;g.add(m);}
  add(new THREE.BoxGeometry(0.22,0.12,0.38),sh,-0.13,0.06,0);
  add(new THREE.BoxGeometry(0.22,0.12,0.38),sh, 0.13,0.06,0);
  add(new THREE.BoxGeometry(0.20,0.43,0.20),pn,-0.13,0.335,0);
  add(new THREE.BoxGeometry(0.20,0.43,0.20),pn, 0.13,0.335,0);
  add(new THREE.BoxGeometry(0.22,0.33,0.22),pn,-0.12,0.715,0);
  add(new THREE.BoxGeometry(0.22,0.33,0.22),pn, 0.12,0.715,0);
  add(new THREE.BoxGeometry(0.56,0.54,0.28),bd,0,1.15,0);
  add(new THREE.BoxGeometry(0.18,0.48,0.18),bd,-0.37,1.18,0);
  add(new THREE.BoxGeometry(0.18,0.48,0.18),bd, 0.37,1.18,0);
  add(new THREE.BoxGeometry(0.16,0.16,0.16),sk,-0.37,0.94,0);
  add(new THREE.BoxGeometry(0.16,0.16,0.16),sk, 0.37,0.94,0);
  add(new THREE.BoxGeometry(0.46,0.44,0.42),sk,0,1.72,0);
  add(new THREE.BoxGeometry(0.10,0.07,0.04),ey,-0.11,1.68,-0.22);
  add(new THREE.BoxGeometry(0.10,0.07,0.04),ey, 0.11,1.68,-0.22);
  add(new THREE.BoxGeometry(0.48,0.10,0.44),hr,0,1.90,0);
  return g;
}

// ── PROJECTILE FACTORY ────────────────────────────────────────────────────────
function makeProj(pr){
  var s=pr.size;
  var mat=new THREE.MeshStandardMaterial({color:pr.color,emissive:pr.color,emissiveIntensity:0.6,roughness:0.3});
  var geo;
  if(pr.shape==='lightning'){
    var lg=new THREE.Group();
    var sg=new THREE.CylinderGeometry(0.07,0.07,2,6);
    var p1=new THREE.Mesh(sg,mat); p1.rotation.x=Math.PI/2; lg.add(p1);
    var p2=new THREE.Mesh(sg,mat); p2.rotation.x=Math.PI/2; p2.position.set(0.25,0.1,1.4); lg.add(p2);
    scene.add(lg); return lg;
  }
  if     (pr.shape==='icosahedron') geo=new THREE.IcosahedronGeometry(s*1.5,0);
  else if(pr.shape==='octahedron')  geo=new THREE.OctahedronGeometry(s*2,0);
  else if(pr.shape==='tetrahedron') geo=new THREE.TetrahedronGeometry(s*1.5,0);
  else if(pr.shape==='rock')        geo=new THREE.DodecahedronGeometry(s*2,0);
  else if(pr.shape==='spike')       geo=new THREE.ConeGeometry(s*0.5,s*5,5);
  else if(pr.shape==='flat')        geo=new THREE.BoxGeometry(s*5,s/2,s*2);
  else if(pr.shape==='cylinder')  { geo=new THREE.CylinderGeometry(s*0.8,s*0.8,s*4,8); geo.rotateX(Math.PI/2); }
  else if(pr.shape==='whirlpool')   geo=new THREE.TorusGeometry(s*4,s*0.5,8,24);
  else if(pr.shape==='wall')      { geo=new THREE.BoxGeometry(6,4,1); mat.transparent=true; mat.opacity=0.85; }
  else                              geo=new THREE.SphereGeometry(s,10,10);
  var m=new THREE.Mesh(geo,mat); m.castShadow=true; scene.add(m); return m;
}

// ── DYNAMIC OBJECTS ───────────────────────────────────────────────────────────
var pMeshes={}, prMeshes={}, tags={}, wpAngles={};
var tmpV=new THREE.Vector3();

function ensureTag(id, name){
  if(tags[id]) return;
  var d=document.createElement('div'); d.className='tag';
  d.innerHTML='<div class="tag-name">'+name+'</div>'
    +'<div class="tag-el" id="te-'+id+'"></div>'
    +'<div class="tag-hp" id="th-'+id+'"></div>'
    +'<div class="tag-bar"><div class="tag-fill" id="tf-'+id+'"></div></div>';
  document.getElementById('tags').appendChild(d);
  tags[id]=d;
}

function updateDirIndicator(state){
  var bar=document.getElementById('dirindicator'); bar.innerHTML='';
  if(!myId||!state.players[myId]) return;
  var me=state.players[myId];
  var cy=Math.cos(me.yaw), sy=Math.sin(me.yaw), W=440;
  for(var id in state.players){
    if(id===myId) continue;
    var p=state.players[id];
    var dx=p.x-me.x, dz=p.z-me.z;
    var fwd=dx*(-sy)+dz*(-cy), right=dx*cy+dz*(-sy);
    if(fwd<=0) continue;
    var ang=Math.atan2(right,fwd);
    var xp=((Math.max(-Math.PI/2,Math.min(Math.PI/2,ang))/(Math.PI/2))*0.5+0.5)*W;
    var pip=document.createElement('div'); pip.className='pip'; pip.style.left=xp+'px';
    var dot=document.createElement('div'); dot.className='pip-dot'; dot.style.background=ec(p.element); dot.style.boxShadow='0 0 5px '+ec(p.element);
    var lbl=document.createElement('div'); lbl.className='pip-name'; lbl.innerText=p.name;
    pip.appendChild(dot); pip.appendChild(lbl); bar.appendChild(pip);
  }
}

// ── SOCKET EVENTS ─────────────────────────────────────────────────────────────
socket.on('joinSuccess', function(data){
  myId=data.id; myEl=''; role='player';
  inp={forward:false,backward:false,left:false,right:false,jump:false,sprint:false,yaw:0,pitch:0};
  // Clean up old meshes/tags
  for(var id in pMeshes){scene.remove(pMeshes[id]);} pMeshes={};
  for(var id in prMeshes){scene.remove(prMeshes[id]);} prMeshes={};
  for(var id in tags){tags[id].remove();} tags={};
  document.getElementById('tags').innerHTML='';
  // Show game UI
  document.getElementById('start').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('hotbar').style.display='flex';
  document.getElementById('dirindicator').style.display='block';
  document.getElementById('chat').style.display='flex';
  document.getElementById('chat-toggle').style.display='block';
  document.getElementById('hud-name').innerText=document.getElementById('name-input').value.trim()||'Player';
  started=true;
  document.body.requestPointerLock();
});

socket.on('death', function(){
  alert('You were defeated! Respawning...');
});

socket.on('serverNuked', function(){
  if(role==='owner') return;
  document.exitPointerLock();
  document.body.innerHTML='<div style="background:black;color:red;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;"><h1 style="font-size:72px;text-shadow:0 0 20px red;">SERVER NUKED</h1><p style="color:white;font-size:20px;margin-top:16px;">Refresh to reconnect.</p></div>';
});

socket.on('chatMessage', function(d){
  var box=document.getElementById('chat-msgs');
  var div=document.createElement('div');
  if(d.name==='SYSTEM')
    div.innerHTML='<span style="font-weight:bold;color:#ff4444;">[SYSTEM]:</span> <span style="color:#ffaaaa;">'+d.text+'</span>';
  else
    div.innerHTML='<span style="font-weight:bold;color:#ffcc00;">['+d.name+']:</span> '+d.text;
  box.appendChild(div); box.scrollTop=box.scrollHeight;
});

socket.on('gameState', function(state){
  if(!started) return;
  document.getElementById('flash').style.opacity=(state.slowMo&&state.slowMo.active)?'1':'0';

  // Update admin player lists
  if(document.getElementById('admin-panel').style.display==='block'){
    var gl=document.getElementById('give-list'), sl=document.getElementById('srv-list');
    var gv=gl.value, sv=sl.value; gl.innerHTML=sl.innerHTML='';
    for(var id in state.players){
      var lb=state.players[id].name+(id===myId?' (You)':'');
      var o1=document.createElement('option'); o1.value=id; o1.innerText=lb; gl.appendChild(o1);
      var o2=document.createElement('option'); o2.value=id; o2.innerText=lb; sl.appendChild(o2);
    }
    if(state.players[gv])gl.value=gv; if(state.players[sv])sl.value=sv;
  }

  updateDirIndicator(state);

  // Players
  var now=Date.now();
  for(var id in state.players){
    var p=state.players[id];
    if(id===myId){
      camera.position.set(p.x, p.y+EYE_H, p.z);
      camera.rotation.set(p.pitch, p.yaw, 0);
      document.getElementById('hp-fill').style.width=Math.max(0,p.hp)+'%';
      document.getElementById('hp-num').innerText=p.godMode?'∞/∞':Math.max(0,Math.ceil(p.hp))+'/100';
      if(myEl!==p.element){
        myEl=p.element;
        var ed=EL[p.element]||EL['AIR'];
        document.getElementById('el-label').innerText=p.element;
        document.getElementById('el-label').style.color=ed.hex;
        for(var i=0;i<4;i++) document.getElementById('n'+i).innerText=ed.moves[i].name;
      }
      // Hotbar
      for(var i=0;i<4;i++){
        var ed=EL[p.element]||EL['AIR'];
        var mc=ed.moves[i].mc||1;
        document.getElementById('c'+i).innerText=mc>1?'['+p.charges[i]+']':'';
        if(p.charges[i]<mc){
          var rem=Math.max(0,(p.rechargeTimers[i]||0)-now);
          document.getElementById('cd'+i).style.height=(rem/(ed.moves[i].cd||1000))*100+'%';
        } else document.getElementById('cd'+i).style.height='0%';
      }
    } else {
      if(!pMeshes[id]){ pMeshes[id]=makePlayer(); scene.add(pMeshes[id]); ensureTag(id,p.name); }
      pMeshes[id].position.set(p.x,p.y,p.z);
      pMeshes[id].rotation.y=p.yaw+Math.PI;
      var ed=EL[p.element]||EL['AIR'];
      var te=document.getElementById('te-'+id), th=document.getElementById('th-'+id), tf=document.getElementById('tf-'+id);
      if(te){te.innerText=p.element;te.style.color=ed.hex;}
      if(th) th.innerText=p.godMode?'∞/100':Math.max(0,Math.ceil(p.hp))+'/100';
      if(tf){tf.style.width=Math.max(0,p.hp)+'%';tf.style.background=p.godMode?'#ffd700':'#ff2222';}
      tmpV.set(p.x,p.y+2.4,p.z); tmpV.project(camera);
      if(tmpV.z<1){
        tags[id].style.display='flex';
        tags[id].style.left=((tmpV.x*0.5+0.5)*innerWidth)+'px';
        tags[id].style.top=((-(tmpV.y*0.5)+0.5)*innerHeight)+'px';
      } else tags[id].style.display='none';
    }
  }
  for(var id in pMeshes){
    if(!state.players[id]){
      scene.remove(pMeshes[id]); delete pMeshes[id];
      if(tags[id]){tags[id].remove();delete tags[id];}
    }
  }

  // Projectiles
  var alive=new Set(state.projectiles.map(function(p){return p.id;}));
  for(var i=0;i<state.projectiles.length;i++){
    var pr=state.projectiles[i];
    if(!prMeshes[pr.id]) prMeshes[pr.id]=makeProj(pr);
    var m=prMeshes[pr.id];
    m.position.set(pr.x,pr.y,pr.z);
    if(pr.shape==='whirlpool'){
      if(!wpAngles[pr.id])wpAngles[pr.id]=0;
      wpAngles[pr.id]+=0.18;
      m.rotation.x=Math.PI/2; m.rotation.z=wpAngles[pr.id];
    } else if(pr.shape==='icosahedron'||pr.shape==='octahedron'||pr.shape==='tetrahedron'){
      m.rotation.x+=0.11; m.rotation.y+=0.09;
    } else if(pr.shape==='wall'){
      m.rotation.y=pr.yaw;
    } else if(pr.vx!==0||pr.vy!==0||pr.vz!==0){
      m.lookAt(pr.x+pr.vx,pr.y+pr.vy,pr.z+pr.vz);
    }
  }
  for(var id in wpAngles) if(!alive.has(id)) delete wpAngles[id];
  for(var id in prMeshes){
    if(!alive.has(id)){ scene.remove(prMeshes[id]); delete prMeshes[id]; }
  }
});

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('mousemove', function(e){
  if(document.pointerLockElement===document.body){
    inp.yaw  -=e.movementX*0.002;
    inp.pitch-=e.movementY*0.002;
    inp.pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,inp.pitch));
  }
});

document.addEventListener('click', function(e){
  if(!started) return;
  if(e.target.id==='chat-toggle'||e.target.closest('#chat')||e.target.closest('#admin-panel')||e.target.closest('#admin-login')) return;
  if(document.pointerLockElement!==document.body)
    document.body.requestPointerLock();
});

document.addEventListener('mousedown', function(e){
  if(document.pointerLockElement===document.body && e.button===0)
    socket.emit('useMove',0);
});

var chatIn=document.getElementById('chat-in');
document.addEventListener('keydown', function(e){
  if(!started) return;
  if(document.activeElement===chatIn) return;
  if(e.key==='Enter'||e.key==='/'){
    e.preventDefault(); document.exitPointerLock();
    document.getElementById('chat').style.display='flex';
    document.getElementById('chat-toggle').innerText='Chat [ON]';
    chatIn.focus(); return;
  }
  if(e.code==='KeyM'){
    var ln=document.getElementById('admin-login'), pn=document.getElementById('admin-panel');
    if(role==='admin'||role==='owner'){
      if(pn.style.display!=='block'){document.exitPointerLock();pn.style.display='block';}
      else{pn.style.display='none';document.body.requestPointerLock();}
    } else {
      if(ln.style.display!=='flex'){document.exitPointerLock();ln.style.display='flex';}
      else{ln.style.display='none';document.body.requestPointerLock();}
    }
    return;
  }
  if(document.pointerLockElement===document.body){
    if(e.code==='Digit1')socket.emit('switchElement','AIR');
    if(e.code==='Digit2')socket.emit('switchElement','EARTH');
    if(e.code==='Digit3')socket.emit('switchElement','FIRE');
    if(e.code==='Digit4')socket.emit('switchElement','WATER');
    if(e.code==='KeyQ')socket.emit('useMove',1);
    if(e.code==='KeyE')socket.emit('useMove',2);
    if(e.code==='KeyR')socket.emit('useMove',3);
    if(e.code==='KeyW'||e.code==='ArrowUp')   inp.forward=true;
    if(e.code==='KeyS'||e.code==='ArrowDown')  inp.backward=true;
    if(e.code==='KeyA'||e.code==='ArrowLeft')  inp.left=true;
    if(e.code==='KeyD'||e.code==='ArrowRight') inp.right=true;
    if(e.code==='ShiftLeft') inp.sprint=true;
    if(e.code==='Space')     inp.jump=true;
  }
});
document.addEventListener('keyup', function(e){
  if(document.activeElement===chatIn) return;
  if(e.code==='KeyW'||e.code==='ArrowUp')   inp.forward=false;
  if(e.code==='KeyS'||e.code==='ArrowDown')  inp.backward=false;
  if(e.code==='KeyA'||e.code==='ArrowLeft')  inp.left=false;
  if(e.code==='KeyD'||e.code==='ArrowRight') inp.right=false;
  if(e.code==='ShiftLeft') inp.sprint=false;
  if(e.code==='Space')     inp.jump=false;
});
document.addEventListener('pointerlockchange', function(){
  if(document.pointerLockElement!==document.body)
    inp.forward=inp.backward=inp.left=inp.right=inp.sprint=inp.jump=false;
});

document.getElementById('chat-send').addEventListener('click', function(){
  if(chatIn.value.trim()){socket.emit('chatMessage',chatIn.value);chatIn.value='';}
});
chatIn.addEventListener('keydown', function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    if(chatIn.value.trim()){socket.emit('chatMessage',chatIn.value);chatIn.value='';}
    chatIn.blur(); document.body.requestPointerLock();
  }
});

// Start buttons
function join(el){ socket.emit('joinGame',{name:document.getElementById('name-input').value.trim()||'Player',element:el}); }
document.getElementById('btn-air').addEventListener('click',   function(){join('AIR');});
document.getElementById('btn-earth').addEventListener('click', function(){join('EARTH');});
document.getElementById('btn-fire').addEventListener('click',  function(){join('FIRE');});
document.getElementById('btn-water').addEventListener('click', function(){join('WATER');});

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function gl(){ return document.getElementById('give-list').value; }
function sl(){ return document.getElementById('srv-list').value; }
function adm(a,t){ socket.emit('adminCommand',{action:a,targetId:t}); }
function givePow(){ socket.emit('adminCommand',{action:'givePower',targetId:gl(),value:document.getElementById('pow-list').value}); }
function swTab(id){
  document.querySelectorAll('.tpanel').forEach(function(e){e.classList.remove('on');});
  document.querySelectorAll('.tbtn').forEach(function(e){e.classList.remove('on');});
  document.getElementById('tp-'+id).classList.add('on');
  document.getElementById('tbtn-'+id).classList.add('on');
}
function checkAdmin(){
  var pw=document.getElementById('admin-pass').value;
  if(pw==='1FOREST1'||pw==='Caleb1'){
    document.getElementById('admin-login').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    role=pw==='Caleb1'?'owner':'admin';
    document.getElementById('panel-title').innerText=role==='owner'?'Owner Panel':'Admin Panel';
    if(role==='owner'){
      document.getElementById('owner-give').style.display='block';
      document.getElementById('owner-server').style.display='block';
    }
    socket.emit('setRole',role);
    document.getElementById('admin-pass').value='';
  } else { alert('Wrong password!'); }
}
function closeAdmin(){ document.getElementById('admin-login').style.display='none'; document.body.requestPointerLock(); }
function toggleChat(){
  var c=document.getElementById('chat'), b=document.getElementById('chat-toggle');
  if(c.style.display==='none'){c.style.display='flex';b.innerText='Chat [ON]';}
  else{c.style.display='none';b.innerText='Chat [OFF]';}
}

// ── LOOPS ─────────────────────────────────────────────────────────────────────
setInterval(function(){
  if(started && document.pointerLockElement===document.body)
    socket.emit('input', inp);
}, 1000/30);

(function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
})();

window.addEventListener('resize', function(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
