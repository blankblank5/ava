<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elemental Arena</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;}
canvas{position:absolute;top:0;left:0;z-index:0;}

#start-screen{position:absolute;inset:0;background:#0a0a0f;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;}
.el-btn{padding:14px 28px;font-size:17px;font-weight:bold;cursor:pointer;border:2px solid transparent;border-radius:8px;transition:transform 0.12s,box-shadow 0.12s;letter-spacing:1px;}
.el-btn:hover{transform:scale(1.07);box-shadow:0 0 18px rgba(255,255,255,0.25);}

#flash-overlay{position:absolute;inset:0;background:rgba(0,50,255,0.25);pointer-events:none;opacity:0;transition:opacity 0.4s;z-index:50;}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:20;width:0;height:0;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.88);border-radius:1px;}
#crosshair::before{width:14px;height:2px;top:-1px;left:-7px;}
#crosshair::after{width:2px;height:14px;top:-7px;left:-1px;}

#game-ui{position:absolute;bottom:20px;left:20px;color:white;text-shadow:1px 1px 3px #000;pointer-events:none;user-select:none;display:none;z-index:20;}
#moves-container{position:absolute;bottom:18px;right:18px;display:none;flex-direction:row;gap:6px;z-index:20;}
.move-slot{background:rgba(12,12,20,0.88);border:2px solid #555;border-radius:6px;width:76px;height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;position:relative;overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s;}
.move-slot.upgraded{border-color:#ffd700!important;box-shadow:0 0 10px rgba(255,215,0,0.7)!important;}
.move-slot.boss-reward{border-color:#ff6600!important;box-shadow:0 0 10px rgba(255,100,0,0.7)!important;}
.move-key{position:absolute;top:4px;left:5px;font-size:10px;font-weight:bold;color:#999;}
.move-name{font-size:10px;text-align:center;z-index:2;padding:0 3px;font-weight:bold;line-height:1.25;margin-top:10px;}
.charge-count{position:absolute;top:4px;right:5px;font-size:12px;font-weight:bold;color:#fff;z-index:3;text-shadow:1px 1px 0 #000;}
.cooldown-overlay{position:absolute;bottom:0;left:0;width:100%;height:0%;background:rgba(200,30,30,0.5);z-index:1;}

#boss-hud{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:3px;z-index:25;pointer-events:none;}
#boss-name-label{color:#ff5500;font-weight:bold;font-size:14px;letter-spacing:3px;text-shadow:0 0 12px rgba(255,80,0,0.9),0 1px 3px #000;}
#boss-hp-track{width:360px;height:20px;background:rgba(0,0,0,0.75);border:2px solid #882200;border-radius:5px;overflow:hidden;}
#boss-hp-fill{height:100%;width:100%;background:linear-gradient(90deg,#6a0000,#ff3300,#ff6600);transition:width 0.12s;}
#boss-hp-text{color:#ffccaa;font-size:12px;font-weight:bold;text-shadow:1px 1px 0 #000;}
#boss-phase-label{font-size:11px;font-weight:bold;letter-spacing:2px;color:#ff8800;}

#dir-indicator{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:440px;height:32px;display:none;pointer-events:none;z-index:19;}
.dir-pip{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);gap:1px;}
.dir-pip-dot{width:10px;height:10px;border-radius:50%;}
.dir-pip-name{font-size:10px;font-weight:bold;color:#fff;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap;}

#nametags-container{position:absolute;inset:0;pointer-events:none;z-index:5;}
.nametag{position:absolute;transform:translate(-50%,-100%);display:none;flex-direction:column;align-items:center;gap:2px;padding-bottom:4px;}
.nametag-name{color:white;font-weight:bold;font-size:13px;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap;}
.nametag-element{font-size:11px;font-weight:bold;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap;}
.nametag-hp-text{color:#fff;font-size:11px;font-weight:bold;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;}
.nametag-hp-track{width:80px;height:6px;background:rgba(0,0,0,0.6);border:1px solid #333;border-radius:3px;overflow:hidden;}
.nametag-hp-fill{height:100%;background:#ff2222;transition:width 0.2s,background 0.3s;}

#chat-wrapper{position:absolute;top:10px;left:10px;width:320px;height:250px;background:rgba(0,0,0,0.55);display:none;flex-direction:column;z-index:100;border-radius:8px;border:1px solid #333;}
#chat-messages{flex:1;overflow-y:auto;padding:10px;color:white;font-size:13px;text-shadow:1px 1px 0 #000;display:flex;flex-direction:column;gap:3px;pointer-events:auto;}
#chat-input-container{display:flex;border-top:1px solid #333;}
#chat-input{flex:1;background:rgba(0,0,0,0.7);color:white;border:none;padding:9px 10px;outline:none;font-family:inherit;font-size:13px;border-radius:0 0 0 8px;}
#chat-send-btn{background:#1a1a2e;color:cyan;border:none;cursor:pointer;padding:0 14px;font-size:15px;border-radius:0 0 8px 0;}
#chat-toggle-btn{position:absolute;top:10px;right:10px;z-index:90;padding:7px 12px;background:rgba(0,0,0,0.55);color:white;border:1px solid #444;cursor:pointer;border-radius:6px;display:none;font-weight:bold;font-size:12px;}

#reward-popup{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.92);border-radius:14px;text-align:center;display:none;z-index:200;pointer-events:none;padding:22px 36px;}
#boss-reward-popup{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);background:rgba(10,0,0,0.95);border:3px solid #ff4400;border-radius:14px;text-align:center;display:none;z-index:201;pointer-events:none;padding:26px 40px;}

#admin-login{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.92);z-index:200;flex-direction:column;align-items:center;justify-content:center;color:white;gap:10px;}
#admin-panel{display:none;position:absolute;top:20px;right:20px;background:rgba(8,8,16,0.96);border:2px solid cyan;padding:15px;color:white;z-index:150;border-radius:10px;width:300px;max-height:80vh;overflow-y:auto;}
.admin-btn{width:100%;margin-bottom:5px;padding:8px;cursor:pointer;font-weight:bold;border:none;border-radius:5px;}
.tab-container{display:flex;margin-bottom:15px;border-bottom:2px solid #333;}
.tab-btn{flex:1;padding:8px;background:#1a1a2e;color:#aaa;border:none;cursor:pointer;font-weight:bold;font-size:12px;}
.tab-btn.active{background:cyan;color:black;}
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>
<body>

<!-- UI LAYERS (all z-index > canvas) -->
<div id="flash-overlay"></div>
<div id="nametags-container"></div>
<div id="dir-indicator"></div>
<div id="crosshair"></div>
<div id="reward-popup"></div>
<div id="boss-reward-popup"></div>

<div id="boss-hud">
  <div id="boss-name-label">⚔ THE STONE TITAN</div>
  <div id="boss-hp-track"><div id="boss-hp-fill"></div></div>
  <div id="boss-hp-text">3000 / 3000</div>
  <div id="boss-phase-label"></div>
</div>

<button id="chat-toggle-btn" onclick="toggleChat()">Chat [ON]</button>
<div id="chat-wrapper">
  <div id="chat-messages"></div>
  <div id="chat-input-container">
    <input type="text" id="chat-input" placeholder="Press Enter or / to chat..." maxlength="100">
    <button id="chat-send-btn">➤</button>
  </div>
</div>

<!-- START SCREEN -->
<div id="start-screen">
  <h1 style="font-size:52px;margin-bottom:4px;letter-spacing:3px;text-shadow:0 0 30px rgba(255,255,255,0.3);">ELEMENTAL ARENA</h1>
  <p style="color:#555;margin-bottom:24px;font-size:13px;letter-spacing:2px;">MULTIPLAYER COMBAT</p>
  <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="15"
    style="padding:13px 18px;font-size:19px;margin-bottom:20px;text-align:center;border-radius:8px;border:2px solid #333;background:#111;color:white;width:300px;outline:none;">
  <p style="color:#666;font-size:12px;letter-spacing:2px;margin-bottom:12px;">SELECT ELEMENT</p>
  <div style="display:flex;gap:12px;">
    <button class="el-btn" id="btn-air"   style="background:#e0e0e0;color:#222;border-color:#bbb;">💨 AIR</button>
    <button class="el-btn" id="btn-earth" style="background:#6b3410;color:white;border-color:#8b4513;">🪨 EARTH</button>
    <button class="el-btn" id="btn-fire"  style="background:#cc3500;color:white;border-color:#ff4500;">🔥 FIRE</button>
    <button class="el-btn" id="btn-water" style="background:#0066cc;color:white;border-color:#0088ff;">💧 WATER</button>
  </div>
  <div id="conn-status" style="margin-top:20px;font-size:13px;color:#888;">Connecting to server...</div>
</div>

<!-- ADMIN LOGIN -->
<div id="admin-login">
  <h2>Admin / Owner Login</h2>
  <input type="password" id="admin-pass" placeholder="Password..."
    style="padding:10px;font-size:17px;border-radius:6px;border:1px solid #444;background:#111;color:white;outline:none;">
  <button onclick="checkAdminLogin()" style="padding:10px 22px;font-size:17px;border-radius:6px;cursor:pointer;">Login</button>
  <button onclick="closeAdminLogin()" style="padding:6px 14px;background:#880000;color:white;border:none;border-radius:6px;cursor:pointer;">Cancel</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <h3 id="panel-title" style="margin-top:0;color:cyan;text-align:center;letter-spacing:1px;">Admin Panel</h3>
  <div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('self')" id="btn-tab-self">Self</button>
    <button class="tab-btn" onclick="switchTab('give')" id="btn-tab-give">Give</button>
    <button class="tab-btn" onclick="switchTab('server')" id="btn-tab-server">Server</button>
  </div>
  <div id="tab-self" class="tab-content active">
    <button class="admin-btn" onclick="sendAdminAction('godmode',window.myId)" style="background:#88aa00;">Toggle Godmode</button>
    <button class="admin-btn" onclick="sendAdminAction('nocooldown',window.myId)" style="background:#bb8800;">Toggle No Cooldowns</button>
    <button class="admin-btn" onclick="sendAdminAction('equipLightning',window.myId)" style="background:#0055ff;color:white;">Equip Lightning</button>
  </div>
  <div id="tab-give" class="tab-content">
    <select id="give-player-list" style="width:100%;padding:7px;margin-bottom:8px;font-weight:bold;border-radius:4px;"></select>
    <button class="admin-btn" onclick="sendAdminAction('heal',document.getElementById('give-player-list').value)" style="background:#00aa00;color:white;">Heal Player</button>
    <button class="admin-btn" onclick="sendAdminAction('godmode',document.getElementById('give-player-list').value)" style="background:#88aa00;">Toggle God Mode</button>
    <button class="admin-btn" onclick="sendAdminAction('nocooldown',document.getElementById('give-player-list').value)" style="background:#bb8800;">Toggle No Cooldowns</button>
    <hr style="border-color:#333;margin:8px 0;">
    <select id="power-list" style="width:100%;padding:5px;margin-bottom:5px;border-radius:4px;">
      <option value="AIR">Air</option><option value="EARTH">Earth</option>
      <option value="FIRE">Fire</option><option value="WATER">Water</option>
    </select>
    <button class="admin-btn" onclick="givePower()" style="background:#444;color:white;">Give Standard Element</button>
    <button class="admin-btn" onclick="sendAdminAction('giveAll',document.getElementById('give-player-list').value)" style="background:#2288cc;color:white;">Give ALL Elements</button>
    <div id="owner-give-section" style="display:none;margin-top:8px;">
      <h4 style="margin:4px 0;color:#ff4444;">Owner Actions</h4>
      <button class="admin-btn" onclick="sendAdminAction('removeAllPowers',document.getElementById('give-player-list').value)" style="background:#ff3333;color:white;">Remove All Powers</button>
    </div>
  </div>
  <div id="tab-server" class="tab-content">
    <select id="server-player-list" style="width:100%;padding:7px;margin-bottom:8px;font-weight:bold;border-radius:4px;"></select>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;">
      <button class="admin-btn" onclick="sendAdminAction('jail',document.getElementById('server-player-list').value)" style="flex:1;">Jail</button>
      <button class="admin-btn" onclick="sendAdminAction('freeze',document.getElementById('server-player-list').value)" style="flex:1;">Freeze</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;">
      <button class="admin-btn" onclick="sendAdminAction('mute',document.getElementById('server-player-list').value)" style="flex:1;background:#cc7700;color:white;">Mute</button>
      <button class="admin-btn" onclick="sendAdminAction('kick',document.getElementById('server-player-list').value)" style="flex:1;background:#aa0000;color:white;">Kick</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;">
      <button class="admin-btn" onclick="sendAdminAction('tp',document.getElementById('server-player-list').value)" style="flex:1;">TP To</button>
      <button class="admin-btn" onclick="sendAdminAction('bring',document.getElementById('server-player-list').value)" style="flex:1;">Bring</button>
    </div>
    <div id="owner-server-section" style="display:none;">
      <hr style="border-color:#333;margin:8px 0;">
      <h4 style="margin:4px 0;color:#ff4444;">Owner Actions</h4>
      <button class="admin-btn" onclick="sendAdminAction('giveAdmin',document.getElementById('server-player-list').value)" style="background:#aa22aa;color:white;">Give Admin Role</button>
      <button class="admin-btn" onclick="sendAdminAction('stripAdmin',document.getElementById('server-player-list').value)" style="background:#ff3333;color:white;">Strip Admin &amp; Powers</button>
      <hr style="border-color:#333;margin:8px 0;">
      <button class="admin-btn" onclick="sendAdminAction('nuke',null)" style="background:darkred;color:white;font-size:15px;padding:14px;">NUKE SERVER</button>
    </div>
  </div>
</div>

<!-- SELF UI -->
<div id="game-ui">
  <div style="margin-bottom:7px;">
    <div id="display-name" style="font-size:17px;font-weight:bold;color:#ddd;margin-bottom:4px;">Player</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:190px;height:13px;background:#3a0000;border:2px solid #1a0000;border-radius:4px;overflow:hidden;">
        <div id="hp-bar" style="width:100%;height:100%;background:linear-gradient(90deg,#cc0000,#ff4444);transition:width 0.18s;"></div>
      </div>
      <span id="hp-numeric" style="font-size:12px;font-weight:bold;color:#fff;min-width:58px;">100/100</span>
    </div>
  </div>
  <div id="el-name" style="font-size:26px;font-weight:bold;letter-spacing:1px;">AIR</div>
</div>

<!-- HOTBAR -->
<div id="moves-container">
  <div class="move-slot" id="slot0"><div class="move-key">LMB</div><div class="charge-count" id="ch0"></div><div class="move-name" id="move0-name">Basic</div><div class="cooldown-overlay" id="cd0"></div></div>
  <div class="move-slot" id="slot1"><div class="move-key">Q</div><div class="charge-count" id="ch1"></div><div class="move-name" id="move1-name">Heavy</div><div class="cooldown-overlay" id="cd1"></div></div>
  <div class="move-slot" id="slot2"><div class="move-key">E</div><div class="charge-count" id="ch2"></div><div class="move-name" id="move2-name">Utility</div><div class="cooldown-overlay" id="cd2"></div></div>
  <div class="move-slot" id="slot3"><div class="move-key">R</div><div class="charge-count" id="ch3"></div><div class="move-name" id="move3-name">Ultimate</div><div class="cooldown-overlay" id="cd3"></div></div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
var SERVER_URL = 'https://ava-pwjs.onrender.com';
var PLAYER_HEIGHT = 1.85, EYE_HEIGHT = 1.62;
var WALL_HALF_W = 3.0, WALL_HALF_H = 2.0, WALL_HALF_D = 0.5;

var ELEMENTS_UI = {
  AIR:      {color:0xffffff,hexStr:'#ffffff',moves:[{name:'Air Blast'},{name:'Wind Blade'},{name:'Air Dash',maxCharges:3,cd:2500},{name:'Hurricane',cd:7000}]},
  EARTH:    {color:0x8b4513,hexStr:'#a0522d',moves:[{name:'Rock Throw'},{name:'Ground Spikes',cd:4500},{name:'Earth Wall',cd:5000},{name:'Meteor',cd:11000}]},
  FIRE:     {color:0xff4500,hexStr:'#ff4500',moves:[{name:'Fireball'},{name:'Fire Blast',cd:4000},{name:'Flamethrower',cd:4500},{name:'Flaming Meteor',cd:14000}]},
  WATER:    {color:0x0088ff,hexStr:'#0088ff',moves:[{name:'Water Bullet'},{name:'Tsunami',cd:4000},{name:'Water Whip',cd:3000},{name:'Whirlpool',cd:8000}]},
  LIGHTNING:{color:0x00ffff,hexStr:'#00ffff',moves:[{name:'Lightning Strike'},{name:'Flash'},{name:'Spark Dash',maxCharges:2,cd:1000},{name:'Thunderstorm'}]}
};
function elColor(el){return(ELEMENTS_UI[el]&&ELEMENTS_UI[el].hexStr)||'#ffffff';}

// ── STATE ─────────────────────────────────────────────────────────────────────
var isGameStarted=false, myElement='';
window.myId=null; window.sessionRole='player';
var inputs={forward:false,backward:false,left:false,right:false,jump:false,sprint:false,yaw:0,pitch:0};
function resetInputs(){inputs.forward=inputs.backward=inputs.left=inputs.right=inputs.jump=inputs.sprint=false;inputs.yaw=inputs.pitch=0;}

// ── SOCKET ────────────────────────────────────────────────────────────────────
var socket = io(SERVER_URL);
var connStatus = document.getElementById('conn-status');
socket.on('connect',function(){connStatus.style.color='#44ff88';connStatus.innerText='✓ Connected — choose your element!';});
socket.on('connect_error',function(){connStatus.style.color='#ff4444';connStatus.innerText='✗ Cannot reach server.';});
socket.on('disconnect',function(){connStatus.style.color='#ffaa00';connStatus.innerText='Disconnected. Refresh to reconnect.';});

// ── THREE.JS SCENE ────────────────────────────────────────────────────────────
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0x87ceeb, 0.006);

var camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);
camera.rotation.order = 'YXZ';

var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
// IMPORTANT: canvas must be behind all UI
renderer.domElement.style.position = 'absolute';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
renderer.domElement.style.zIndex = '0';
document.body.appendChild(renderer.domElement);

// Lights
var sun = new THREE.DirectionalLight(0xfff8e8,1.3);
sun.position.set(80,160,60); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-200; sun.shadow.camera.right=200;
sun.shadow.camera.top=200; sun.shadow.camera.bottom=-200; sun.shadow.camera.far=600;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6688cc,1.0));
var fill=new THREE.DirectionalLight(0xaaccff,0.3); fill.position.set(-40,20,-40); scene.add(fill);

// Floor
var floor=new THREE.Mesh(new THREE.PlaneGeometry(3000,3000),new THREE.MeshStandardMaterial({color:0x2d8a2d,roughness:0.92}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
var grid=new THREE.GridHelper(3000,600,0x000000,0x1c6e1c);
grid.position.y=0.02; grid.material.opacity=0.3; grid.material.transparent=true; scene.add(grid);

// ── JAIL ──────────────────────────────────────────────────────────────────────
(function(){
  var jg=new THREE.Group(); jg.position.set(20,0.02,20);
  var pm=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.8});
  jg.add(new THREE.Mesh(new THREE.BoxGeometry(12,0.5,12),pm));
  var roof=new THREE.Mesh(new THREE.BoxGeometry(12,0.5,12),pm); roof.position.y=10; jg.add(roof);
  var bm=new THREE.MeshStandardMaterial({color:0x888888,metalness:0.75,roughness:0.25});
  var bg=new THREE.CylinderGeometry(0.12,0.12,10,8);
  for(var x=-5.5;x<=5.5;x+=1.5){
    var b1=new THREE.Mesh(bg,bm); b1.position.set(x,5,-5.5); jg.add(b1);
    var b2=new THREE.Mesh(bg,bm); b2.position.set(x,5,5.5); jg.add(b2);
  }
  for(var z=-4;z<=4;z+=1.5){
    var bl=new THREE.Mesh(bg,bm); bl.position.set(-5.5,5,z); jg.add(bl);
    var br=new THREE.Mesh(bg,bm); br.position.set(5.5,5,z); jg.add(br);
  }
  scene.add(jg);
})();

// ── BOSS ARENA ────────────────────────────────────────────────────────────────
(function(){
  var CX=120,CZ=0;
  var stone=new THREE.MeshStandardMaterial({color:0x7a6e5a,roughness:0.95});
  var dark=new THREE.MeshStandardMaterial({color:0x3a3028,roughness:1.0});
  var moss=new THREE.MeshStandardMaterial({color:0x3a5030,roughness:1.0});
  var sand=new THREE.MeshStandardMaterial({color:0xc8b060,roughness:0.9});
  var blood=new THREE.MeshStandardMaterial({color:0x5a1a0a,roughness:1.0});
  scene.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(30,30,0.5,40),sand),{position:new THREE.Vector3(CX,0.25,CZ)}));
  scene.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(12,12,0.52,32),blood),{position:new THREE.Vector3(CX,0.26,CZ)}));
  for(var i=0;i<20;i++){
    var ang=(i/20)*Math.PI*2,wx=CX+Math.cos(ang)*30,wz=CZ+Math.sin(ang)*30;

function buildShrine(el,sx,sy,sz,col){
  var g=new THREE.Group();
  var st=new THREE.MeshStandardMaterial({color:0x9a8a70,roughness:0.92});
  var em=new THREE.MeshStandardMaterial({color:col,roughness:0.6});
  var gm=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.4,roughness:0.15});

  // Island
  var isl=new THREE.Mesh(new THREE.CylinderGeometry(14,7,6,12),new THREE.MeshStandardMaterial({color:0x6a5a48,roughness:1.0}));
  isl.position.y=-3; g.add(isl);
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(14,14,0.7,12),gr),{position:new THREE.Vector3(0,0.35,0)}));
  // Base
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(11,0.9,11),st),{position:new THREE.Vector3(0,0.45,0)}));
  // Pillars
  [[-3.8,3.8],[3.8,3.8],[-3.8,-3.8],[3.8,-3.8]].forEach(function(p){
    var pil=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.7,6,8),st); pil.position.set(p[0],3.9,p[1]); g.add(pil);
    var cap=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.55,1.4),em); cap.position.set(p[0],7.0,p[1]); g.add(cap);
  });
  // Roof
  var roof=new THREE.Mesh(new THREE.BoxGeometry(10,0.55,10),em); roof.position.y=7.55; g.add(roof);
  var peak=new THREE.Mesh(new THREE.ConeGeometry(2.8,3.5,4),em); peak.position.y=9.8; peak.rotation.y=Math.PI/4; g.add(peak);
  // Orb
  var ped=new THREE.Mesh(new THREE.CylinderGeometry(0.8,1.0,1.6,8),st); ped.position.y=1.7; g.add(ped);
  var orb=new THREE.Mesh(new THREE.SphereGeometry(1.0,16,16),gm); orb.position.y=3.7; g.add(orb); shrineOrbs[el]=orb;
  var ring=new THREE.Mesh(new THREE.TorusGeometry(1.7,0.14,8,32),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.9}));
  ring.rotation.x=Math.PI/2; ring.position.y=3.7; g.add(ring); shrineRings[el]=ring;
  // Orbit rocks
  var rocks=[];
  for(var r=0;r<5;r++){
    var rk=new THREE.Mesh(new THREE.DodecahedronGeometry(0.35+Math.random()*0.3,0),st);
    rk.userData={angle:(r/5)*Math.PI*2,radius:16+Math.random()*2,speed:0.003+Math.random()*0.002,yOff:-1+Math.random()*2};
    g.add(rk); rocks.push(rk);
  }
  g.userData.rocks=rocks;
  g.position.set(sx,sy,sz);
  scene.add(g);
  shrineGroups[el]=g;
}

function createProjectileMesh(data){
  var s=data.size;
  var mat=new THREE.MeshStandardMaterial({color:data.color,emissive:data.color,emissiveIntensity:0.65,roughness:0.3});
  var geo;
  if(data.shape==='lightning'){
    var lg=new THREE.Group();
    var sg=new THREE.CylinderGeometry(0.07,0.07,2,6);
    var p1=new THREE.Mesh(sg,mat); p1.rotation.x=Math.PI/2; lg.add(p1);
    var p2=new THREE.Mesh(sg,mat); p2.rotation.x=Math.PI/2; p2.position.set(0.25,0.1,1.4); lg.add(p2);
    scene.add(lg); return lg;
  }
  if(data.shape==='whirlpool')     geo=new THREE.TorusGeometry(s*4,s*0.5,8,24);
  else if(data.shape==='icosahedron') geo=new THREE.IcosahedronGeometry(s*1.5,0);
  else if(data.shape==='octahedron')  geo=new THREE.OctahedronGeometry(s*2,0);
  else if(data.shape==='tetrahedron') geo=new THREE.TetrahedronGeometry(s*1.5,0);
  else if(data.shape==='torusknot')   geo=new THREE.TorusKnotGeometry(s*1.5,s*0.4,64,8);
  else if(data.shape==='rock')        geo=new THREE.DodecahedronGeometry(s*2,0);
  else if(data.shape==='spike')       geo=new THREE.ConeGeometry(s*0.5,s*5,5);
  else if(data.shape==='flat')        geo=new THREE.BoxGeometry(s*5,s/2,s*2);
  else if(data.shape==='cylinder'){   geo=new THREE.CylinderGeometry(s*0.8,s*0.8,s*4,8); geo.rotateX(Math.PI/2);}
  else if(data.shape==='wall'){       geo=new THREE.BoxGeometry(6,4,1); mat.transparent=true; mat.opacity=0.88;}
  else if(data.shape==='cone'){       geo=new THREE.ConeGeometry(s*3.5,s*10,8); geo.rotateX(Math.PI);}
  else geo=new THREE.SphereGeometry(s,10,10);
  var mesh=new THREE.Mesh(geo,mat); mesh.castShadow=true; scene.add(mesh); return mesh;
}

function getOrCreateWallPoints(id){

  var geo=new THREE.SphereGeometry(0.12,6,6);
  var pivot=new THREE.Group(); scene.add(pivot);
  wallPoints[id]={pivot}; return wallPoints[id];

function cleanupWallPoints(id){if(!wallPoints[id])return;scene.remove(wallPoints[id].pivot);delete wallPoints[id];}

function updateDirIndicator(state){
  var div=document.getElementById('dir-indicator'); div.innerHTML='';
  if(!window.myId||!state.players[window.myId])return;
  var me=state.players[window.myId];
  var cosY=Math.cos(me.yaw),sinY=Math.sin(me.yaw),W=440;
  for(var id in state.players){
    if(id===window.myId)continue;
    var p=state.players[id],dx=p.x-me.x,dz=p.z-me.z;
    var fwd=dx*(-sinY)+dz*(-cosY),right=dx*cosY+dz*(-sinY);
    if(fwd<=0)continue;
    var ang=Math.atan2(right,fwd);
    var xPos=((Math.max(-Math.PI/2,Math.min(Math.PI/2,ang))/(Math.PI/2))*0.5+0.5)*W;
    var pip=document.createElement('div'); pip.className='dir-pip'; pip.style.left=xPos+'px';
    var dot=document.createElement('div'); dot.className='dir-pip-dot'; dot.style.background=elColor(p.element); dot.style.boxShadow='0 0 5px '+elColor(p.element);
    var lbl=document.createElement('div'); lbl.className='dir-pip-name'; lbl.innerText=p.name;
    pip.appendChild(dot); pip.appendChild(lbl); div.appendChild(pip);
  }
}

socket.on('gameState',function(state){
  if(!isGameStarted)return;
  var now=Date.now(); _t+=0.018;
  document.getElementById('flash-overlay').style.opacity=(state.slowMo&&state.slowMo.active)?'1':'0';

  // Admin panel player lists
  if(document.getElementById('admin-panel').style.display==='block'){
    var gs=document.getElementById('give-player-list'),ss=document.getElementById('server-player-list');
    var cg=gs.value,cs=ss.value; gs.innerHTML=ss.innerHTML='';
    for(var id in state.players){
      var lb=state.players[id].name+(id===window.myId?' (You)':'');
      var og=document.createElement('option'); og.value=id; og.innerText=lb; gs.appendChild(og);
      var os=document.createElement('option'); os.value=id; os.innerText=lb; ss.appendChild(os);
    }
    if(state.players[cg])gs.value=cg; if(state.players[cs])ss.value=cs;
  }

  // Boss
  if(state.boss){
    var bHUD=document.getElementById('boss-hud');
    if(state.boss.alive){
      bHUD.style.display='flex'; bossMeshGroup.visible=true; bossRubble.visible=false;
      var pct=Math.max(0,state.boss.hp)/state.boss.maxHp*100;
      document.getElementById('boss-hp-fill').style.width=pct+'%';
      document.getElementById('boss-hp-text').innerText=Math.max(0,Math.ceil(state.boss.hp))+' / '+state.boss.maxHp;
      document.getElementById('boss-phase-label').innerText=state.boss.phase===2?'⚠ ENRAGED — PHASE 2':'';
      if(state.boss.phase===2)document.getElementById('boss-hp-fill').style.background='linear-gradient(90deg,#550000,#ff0000,#ff4400)';
      bossMeshGroup.position.set(state.boss.x,state.boss.y,state.boss.z);
      bossMeshGroup.rotation.y=state.boss.yaw;
      var sw=Math.sin(_t*7)*0.3;
      if(bossMeshGroup.children[1])bossMeshGroup.children[1].rotation.x=sw;
      if(bossMeshGroup.children[2])bossMeshGroup.children[2].rotation.x=-sw;
      if(bossMeshGroup.children[5])bossMeshGroup.children[5].rotation.x=-sw;
      if(bossMeshGroup.children[6])bossMeshGroup.children[6].rotation.x=sw;
    }else{
      bHUD.style.display='none'; bossMeshGroup.visible=false; bossRubble.visible=true;
      bossRubble.position.set(state.boss.x||120,0,state.boss.z||0);
    }
  }

  // Shrines animate
  for(var el in shrineOrbs){
    var orb=shrineOrbs[el];
    orb.position.y=3.7+Math.sin(_t*2.2+el.charCodeAt(0)*0.5)*0.4;
    orb.rotation.y+=0.025;
    if(shrineRings[el]){shrineRings[el].rotation.z+=0.02;shrineRings[el].position.y=orb.position.y;}
  }
  for(var el in shrineGroups){
    var g=shrineGroups[el];
    if(g.userData.rocks)g.userData.rocks.forEach(function(rk){
      rk.userData.angle+=rk.userData.speed;
      rk.position.x=Math.cos(rk.userData.angle)*rk.userData.radius;
      rk.position.z=Math.sin(rk.userData.angle)*rk.userData.radius;
      rk.position.y=rk.userData.yOff+Math.sin(rk.userData.angle*3)*1.2;
      rk.rotation.y+=0.01;
    });
  }

  updateDirIndicator(state);

  // Players
  for(var id in state.players){
    var p=state.players[id];
    if(id===window.myId){
      camera.position.set(p.x,p.y+EYE_HEIGHT,p.z);
      camera.rotation.set(p.pitch,p.yaw,0);
      document.getElementById('hp-bar').style.width=Math.max(0,p.hp)+'%';
      document.getElementById('hp-numeric').innerText=p.godMode?'∞/∞':Math.max(0,Math.ceil(p.hp))+'/100';
      if(myElement!==p.element){
        myElement=p.element;
        var elDef=ELEMENTS_UI[p.element]||ELEMENTS_UI['AIR'];
        document.getElementById('el-name').innerText=p.element;
        document.getElementById('el-name').style.color='#'+elDef.color.toString(16).padStart(6,'0');
        for(var i=0;i<4;i++)document.getElementById('move'+i+'-name').innerText=elDef.moves[i].name;
      }
      // Hotbar cooldowns
      for(var i=0;i<4;i++){
        var elDef=ELEMENTS_UI[p.element]||ELEMENTS_UI['AIR'];
        var max=elDef.moves[i].maxCharges||1;
        document.getElementById('ch'+i).innerText=max>1?'['+p.charges[i]+']':'';
        if(p.charges[i]<max){
          var rem=Math.max(0,p.rechargeTimers[i]-now);
          document.getElementById('cd'+i).style.height=(rem/(elDef.moves[i].cd||1000))*100+'%';
        }else document.getElementById('cd'+i).style.height='0%';
      }
    }else{
      if(!playerMeshes[id]){playerMeshes[id]=makePlayerMesh();scene.add(playerMeshes[id]);ensureNametag(id,p.name);}
      playerMeshes[id].position.set(p.x,p.y,p.z);
      playerMeshes[id].rotation.y=p.yaw+Math.PI;
      var elDef=ELEMENTS_UI[p.element]||ELEMENTS_UI['AIR'];
      var ntEl=document.getElementById('nt-el-'+id);
      var ntTxt=document.getElementById('nt-hp-txt-'+id);
      var ntFil=document.getElementById('nt-hp-'+id);
      if(ntEl){ntEl.innerText=p.element;ntEl.style.color=elDef.hexStr;}
      if(ntTxt)ntTxt.innerText=p.godMode?'∞/100':Math.max(0,Math.ceil(p.hp))+'/100';
      if(ntFil){ntFil.style.width=Math.max(0,p.hp)+'%';ntFil.style.background=p.godMode?'#ffd700':'#ff2222';}
      tempV.set(p.x,p.y+PLAYER_HEIGHT+0.35,p.z); tempV.project(camera);
      if(tempV.z<1){
        nametagEls[id].style.display='flex';
        nametagEls[id].style.left=((tempV.x*0.5+0.5)*window.innerWidth)+'px';
        nametagEls[id].style.top=((-(tempV.y*0.5)+0.5)*window.innerHeight)+'px';
      }else nametagEls[id].style.display='none';
    }
  }
  for(var id in playerMeshes){
    if(!state.players[id]){
      scene.remove(playerMeshes[id]);delete playerMeshes[id];
      if(nametagEls[id]){nametagEls[id].remove();delete nametagEls[id];}
    }
  }

  // Projectiles
  var activeProjIds=new Set(state.projectiles.map(function(pr){return pr.id;}));
  var activeWallIds=new Set();
  for(var i=0;i<state.projectiles.length;i++){
    var pr=state.projectiles[i];
    if(!projectileMeshes[pr.id])projectileMeshes[pr.id]=createProjectileMesh(pr);
    var mesh=projectileMeshes[pr.id];
    mesh.position.set(pr.x,pr.y,pr.z);
    if(pr.shape==='wall'){mesh.rotation.y=pr.yaw;activeWallIds.add(pr.id);var wp=getOrCreateWallPoints(pr.id);wp.pivot.position.set(pr.x,pr.y,pr.z);wp.pivot.rotation.y=pr.yaw;}
    else if(pr.shape==='whirlpool'){if(!whirlpoolAngles[pr.id])whirlpoolAngles[pr.id]=0;whirlpoolAngles[pr.id]+=0.18;mesh.rotation.x=Math.PI/2;mesh.rotation.z=whirlpoolAngles[pr.id];}
    else if(pr.shape==='icosahedron'||pr.shape==='octahedron'||pr.shape==='tetrahedron'||pr.shape==='torusknot'){mesh.rotation.x+=0.11;mesh.rotation.y+=0.09;}
    else if(pr.vx!==0||pr.vy!==0||pr.vz!==0)mesh.lookAt(pr.x+pr.vx,pr.y+pr.vy,pr.z+pr.vz);
  }
  for(var id in wallPoints)if(!activeWallIds.has(id))cleanupWallPoints(id);
  for(var id in whirlpoolAngles)if(!activeProjIds.has(id))delete whirlpoolAngles[id];
  for(var id in projectileMeshes)if(!activeProjIds.has(id)){scene.remove(projectileMeshes[id]);delete projectileMeshes[id];}
});

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('mousemove',function(e){
  if(document.pointerLockElement===document.body){
    inputs.yaw-=e.movementX*0.002;
    inputs.pitch-=e.movementY*0.002;
    inputs.pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,inputs.pitch));
  }
});

document.addEventListener('click',function(e){
  if(!isGameStarted)return;
  if(e.target.id==='chat-toggle-btn'||e.target.id==='chat-input'||e.target.id==='chat-send-btn'||e.target.closest('#chat-wrapper')||e.target.classList.contains('admin-btn'))return;
  if(document.pointerLockElement!==document.body&&document.getElementById('admin-panel').style.display!=='block'&&document.getElementById('admin-login').style.display!=='flex')
    document.body.requestPointerLock();
});

document.addEventListener('mousedown',function(e){
  if(document.pointerLockElement===document.body&&e.button===0)socket.emit('useMove',0);
});

var chatInput=document.getElementById('chat-input');
document.addEventListener('keydown',function(e){
  if(!isGameStarted)return;
  if(document.activeElement===chatInput)return;
  if(e.key==='Enter'||e.key==='/'){e.preventDefault();document.exitPointerLock();document.getElementById('chat-wrapper').style.display='flex';document.getElementById('chat-toggle-btn').innerText='Chat [ON]';chatInput.focus();return;}
  if(e.code==='KeyM'){
    var ln=document.getElementById('admin-login'),pn=document.getElementById('admin-panel');
    if(window.sessionRole==='admin'||window.sessionRole==='owner'){
      if(pn.style.display!=='block'){document.exitPointerLock();pn.style.display='block';}
      else{pn.style.display='none';document.body.requestPointerLock();}
    }else{
      if(ln.style.display!=='flex'){document.exitPointerLock();ln.style.display='flex';}
      else{ln.style.display='none';document.body.requestPointerLock();}
    }
    return;
  }
  if(document.pointerLockElement===document.body){
    if(e.code==='Digit1')socket.emit('switchElement','AIR');
    if(e.code==='Digit2')socket.emit('switchElement','EARTH');
    if(e.code==='Digit3')socket.emit('switchElement','FIRE');
    if(e.code==='Digit4')socket.emit('switchElement','WATER');
    if(e.code==='KeyQ')socket.emit('useMove',1);
    if(e.code==='KeyE')socket.emit('useMove',2);
    if(e.code==='KeyR')socket.emit('useMove',3);
    if(e.code==='KeyW'||e.code==='ArrowUp')inputs.forward=true;
    if(e.code==='KeyS'||e.code==='ArrowDown')inputs.backward=true;
    if(e.code==='KeyA'||e.code==='ArrowLeft')inputs.left=true;
    if(e.code==='KeyD'||e.code==='ArrowRight')inputs.right=true;
    if(e.code==='ShiftLeft')inputs.sprint=true;
    if(e.code==='Space')inputs.jump=true;
  }
});

document.addEventListener('keyup',function(e){
  if(document.activeElement===chatInput)return;
  if(e.code==='KeyW'||e.code==='ArrowUp')inputs.forward=false;
  if(e.code==='KeyS'||e.code==='ArrowDown')inputs.backward=false;
  if(e.code==='KeyA'||e.code==='ArrowLeft')inputs.left=false;
  if(e.code==='KeyD'||e.code==='ArrowRight')inputs.right=false;
  if(e.code==='ShiftLeft')inputs.sprint=false;
  if(e.code==='Space')inputs.jump=false;
});

document.addEventListener('pointerlockchange',function(){
  if(document.pointerLockElement!==document.body)
    inputs.forward=inputs.backward=inputs.left=inputs.right=inputs.sprint=inputs.jump=false;
});

document.getElementById('chat-send-btn').addEventListener('click',function(){
  if(chatInput.value.trim()){socket.emit('chatMessage',chatInput.value);chatInput.value='';}
});
chatInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();if(chatInput.value.trim()){socket.emit('chatMessage',chatInput.value);chatInput.value='';}chatInput.blur();}
});

// Start screen buttons
document.getElementById('btn-air').addEventListener('click',function(){socket.emit('joinGame',{name:document.getElementById('player-name-input').value.trim()||'Player',element:'AIR'});});
document.getElementById('btn-earth').addEventListener('click',function(){socket.emit('joinGame',{name:document.getElementById('player-name-input').value.trim()||'Player',element:'EARTH'});});
document.getElementById('btn-fire').addEventListener('click',function(){socket.emit('joinGame',{name:document.getElementById('player-name-input').value.trim()||'Player',element:'FIRE'});});
document.getElementById('btn-water').addEventListener('click',function(){socket.emit('joinGame',{name:document.getElementById('player-name-input').value.trim()||'Player',element:'WATER'});});

// ── GLOBAL FUNCTIONS ──────────────────────────────────────────────────────────
window.toggleChat=function(){
  var c=document.getElementById('chat-wrapper'),b=document.getElementById('chat-toggle-btn');
  if(c.style.display==='none'){c.style.display='flex';b.innerText='Chat [ON]';}
  else{c.style.display='none';b.innerText='Chat [OFF]';}
};
window.switchTab=function(id){
  document.querySelectorAll('.tab-content').forEach(function(e){e.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(e){e.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('btn-tab-'+id).classList.add('active');
};
window.checkAdminLogin=function(){
  var pass=document.getElementById('admin-pass').value;
  if(pass==='1FOREST1'||pass==='Caleb1'){
    document.getElementById('admin-login').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    window.sessionRole=pass==='Caleb1'?'owner':'admin';
    document.getElementById('panel-title').innerText=window.sessionRole==='owner'?'Owner Panel':'Admin Panel';
    if(window.sessionRole==='owner'){
      document.getElementById('owner-give-section').style.display='block';
      document.getElementById('owner-server-section').style.display='block';
    }
    socket.emit('setRole',window.sessionRole);
    document.getElementById('admin-pass').value='';
  }else alert('Incorrect Password!');
};
window.closeAdminLogin=function(){document.getElementById('admin-login').style.display='none';document.body.requestPointerLock();};
window.sendAdminAction=function(a,t){socket.emit('adminCommand',{action:a,targetId:t});};
window.givePower=function(){socket.emit('adminCommand',{action:'givePower',targetId:document.getElementById('give-player-list').value,value:document.getElementById('power-list').value});};

// ── INPUT LOOP ────────────────────────────────────────────────────────────────
setInterval(function(){
  if(isGameStarted&&document.pointerLockElement===document.body)socket.emit('input',inputs);
},1000/30);

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();

window.addEventListener('resize',function(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
